<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('会议室价格配置')" />
</head>
<body class="gray-bg">
<div class="container-div">
    <div class="row">
        <div class="col-sm-12 search-collapse">
            <form id="live-fixed-price-form">
                <div class="select-list">
                    <ul>
                        <li>
                            会议时长：
                            <select name="durationId" id="live-fixed-price-search-duration">
                                <option value="">请选择会议时长</option>
                            </select>
                        </li>
                        <li>
                            会议室人数：
                            <select name="tierId" id="live-fixed-price-search-tier">
                                <option value="">请选择会议室人数</option>
                            </select>
                        </li>
                        <li>
                            状态：
                            <select name="status" id="live-fixed-price-search-status"></select>
                        </li>
                        <li>固定配置价格：<input type="text" class="im-amount-input" name="fixedPrice" placeholder="请输入固定配置价格"/></li>
                        <li>
                            <a class="btn btn-primary btn-rounded btn-sm" onclick="imTableSearch('live-fixed-price-form')"><i class="fa fa-search"></i>&nbsp;查询</a>
                            <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                        </li>
                    </ul>
                </div>
            </form>
        </div>

        <div class="btn-group-sm" id="toolbar" role="group">
            <a class="btn btn-success" onclick="imLiveFixedPriceOpenModal('add')">
                <i class="fa fa-plus"></i> 新建
            </a>
        </div>

        <div class="col-sm-12 select-table table-striped">
            <table id="bootstrap-table"></table>
        </div>
    </div>
</div>

<div id="live-fixed-price-modal" style="display:none;">
    <form id="live-fixed-price-modal-form" class="form-horizontal" style="padding:15px 20px;">
        <input type="hidden" id="live-fixed-price-id"/>
        <div class="form-group">
            <label class="col-sm-4 control-label"><span class="text-danger">*</span> 会议室时长：</label>
            <div class="col-sm-7">
                <select class="form-control" id="live-fixed-price-duration">
                    <option value="">请选择会议室时长</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-4 control-label"><span class="text-danger">*</span> 会议室人数：</label>
            <div class="col-sm-7">
                <select class="form-control" id="live-fixed-price-tier">
                    <option value="">请选择会议室人数</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-4 control-label"><span class="text-danger">*</span> 固定配置价格：</label>
            <div class="col-sm-7">
                <input type="text" class="form-control" id="live-fixed-price-value" placeholder="请输入固定配置价格"/>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-4 control-label"><span class="text-danger">*</span> 状态：</label>
            <div class="col-sm-7">
                <select class="form-control" id="live-fixed-price-status"></select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-4 control-label">备注：</label>
            <div class="col-sm-7">
                <textarea class="form-control" id="live-fixed-price-remark" rows="3" placeholder="请输入备注"></textarea>
            </div>
        </div>
    </form>
</div>

<th:block th:include="include :: footer" />
<script th:src="@{/web4x/js/im-table.js?v=20260608}"></script>
<script th:src="@{/web4x/js/im-live-common.js?v=20260608}"></script>
<script th:src="@{/web4x/js/im-live-fixed-price.js?v=20260608}"></script>
<script th:inline="javascript">
    $(function () {
        imLiveFixedPriceInitTable();
    });
</script>
</body>
</html>
