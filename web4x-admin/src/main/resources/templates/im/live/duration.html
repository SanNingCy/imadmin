<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('会议室时长配置')" />
</head>
<body class="gray-bg">
<div class="container-div">
    <div class="row">
        <div class="col-sm-12 search-collapse">
            <form id="live-duration-form">
                <div class="select-list">
                    <ul>
                        <li>时长名称：<input type="text" name="durationName" placeholder="请输入时长名称"/></li>
                        <li>
                            状态：
                            <select name="status" id="live-duration-search-status"></select>
                        </li>
                        <li>
                            <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;查询</a>
                            <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                        </li>
                    </ul>
                </div>
            </form>
        </div>

        <div class="btn-group-sm" id="toolbar" role="group">
            <a class="btn btn-success" onclick="imLiveDurationOpenModal('add')">
                <i class="fa fa-plus"></i> 新建
            </a>
        </div>

        <div class="col-sm-12 select-table table-striped">
            <table id="bootstrap-table"></table>
        </div>
    </div>
</div>

<div id="live-duration-modal" style="display:none;">
    <form id="live-duration-modal-form" class="form-horizontal" style="padding:15px 20px;">
        <input type="hidden" id="live-duration-id"/>
        <div class="form-group">
            <label class="col-sm-4 control-label"><span class="text-danger">*</span> 时长名称：</label>
            <div class="col-sm-7">
                <input type="text" class="form-control" id="live-duration-name" placeholder="时长名称(如:30分钟,1小时)"/>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-4 control-label"><span class="text-danger">*</span> 时长值：</label>
            <div class="col-sm-7">
                <input type="number" class="form-control" id="live-duration-value" min="1" step="1" placeholder="时长值(单位:分钟)"/>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-4 control-label"><span class="text-danger">*</span> 状态：</label>
            <div class="col-sm-7">
                <select class="form-control" id="live-duration-status"></select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-4 control-label">备注：</label>
            <div class="col-sm-7">
                <textarea class="form-control" id="live-duration-remark" rows="3" placeholder="请输入备注"></textarea>
            </div>
        </div>
    </form>
</div>

<th:block th:include="include :: footer" />
<script th:src="@{/web4x/js/im-table.js?v=20260608}"></script>
<script th:src="@{/web4x/js/im-live-common.js?v=20260608}"></script>
<script th:src="@{/web4x/js/im-live-duration.js?v=20260608}"></script>
<script th:inline="javascript">
    $(function () {
        imLiveDurationInitTable();
    });
</script>
</body>
</html>
