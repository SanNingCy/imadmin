<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('会议代币系数配置')" />
    <style>
        .live-room-config-panel {
            max-width: 860px;
            margin: 0 auto;
            background: #fff;
            border-radius: 6px;
            padding: 24px 28px;
        }
        .live-room-config-title {
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 24px;
        }
        .live-budget-section {
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid #eee;
        }
        .live-budget-section h4 {
            margin-bottom: 16px;
            font-size: 15px;
        }
        .live-budget-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            margin-bottom: 8px;
            background: #f5f5f5;
            border-radius: 4px;
            font-size: 13px;
        }
        .live-budget-item .amount {
            color: #f0ad4e;
            font-weight: 600;
            white-space: nowrap;
            margin-left: 12px;
        }
        .live-room-config-actions {
            text-align: center;
            margin-top: 28px;
        }
    </style>
</head>
<body class="gray-bg">
<div class="container-div">
    <div class="row">
        <div class="col-sm-12">
            <div class="live-room-config-panel">
                <div class="live-room-config-title">会议代币系数配置</div>
                <form id="live-room-config-form" class="form-horizontal">
                    <input type="hidden" id="live-room-config-id"/>
                    <div class="form-group">
                        <label class="col-sm-3 control-label">代币比例系数：</label>
                        <div class="col-sm-8">
                            <input type="text" class="form-control" id="live-room-config-coefficient" placeholder="请输入代币比例系数"/>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-3 control-label">续费规则：</label>
                        <div class="col-sm-8">
                            <textarea class="form-control" id="live-room-config-renewal" rows="4" placeholder="请输入续费规则"></textarea>
                        </div>
                    </div>
                </form>

                <div class="live-budget-section">
                    <h4>套餐模式价格预算</h4>
                    <div id="live-room-config-budget"></div>
                </div>

                <div class="live-room-config-actions">
                    <a class="btn btn-primary" onclick="imLiveRoomConfigSave()"><i class="fa fa-save"></i> 保存配置</a>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block th:include="include :: footer" />
<script th:src="@{/web4x/js/im-table.js?v=20260608}"></script>
<script th:src="@{/web4x/js/im-live-common.js?v=20260608}"></script>
<script th:src="@{/web4x/js/im-live-room-config.js?v=20260608}"></script>
<script th:inline="javascript">
    $(function () {
        imLiveRoomConfigInit();
    });
</script>
</body>
</html>
