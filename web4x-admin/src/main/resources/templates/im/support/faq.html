<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('常见问题')" />
</head>
<body class="gray-bg">
<div class="container-div">
    <div class="row">
        <div class="col-sm-12 search-collapse">
            <form id="faq-form">
                <div class="select-list">
                    <ul>
                        <li>标题：<input type="text" name="title"/></li>
                        <li>
                            语言编码：
                            <select name="lang" id="faq-search-lang">
                                <option value="">所有</option>
                            </select>
                        </li>
                        <li>
                            <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;查询</a>
                            <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                        </li>
                    </ul>
                </div>
            </form>
        </div>
        <div class="btn-group-sm" id="toolbar" role="group">
            <a class="btn btn-success" onclick="imFaqOpenModal('add')" shiro:hasPermission="ops:support:faq:add">
                <i class="fa fa-plus"></i> 新建
            </a>
            <a class="btn btn-primary single disabled" onclick="imFaqEditSelected()" shiro:hasPermission="ops:support:faq:edit">
                <i class="fa fa-edit"></i> 修改
            </a>
            <a class="btn btn-danger multiple disabled" onclick="imFaqRemoveSelected()" shiro:hasPermission="ops:support:faq:delete">
                <i class="fa fa-remove"></i> 删除
            </a>
        </div>
        <div class="col-sm-12 select-table table-striped">
            <table id="bootstrap-table"></table>
        </div>
    </div>
</div>

<div id="faq-modal" style="display:none;">
    <form id="faq-modal-form" class="form-horizontal" style="padding:15px 20px;">
        <input type="hidden" id="faq-id"/>
        <div class="form-group">
            <label class="col-sm-3 control-label"><span class="text-danger">*</span> 标题：</label>
            <div class="col-sm-8"><input type="text" class="form-control" id="faq-title"/></div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">排序：</label>
            <div class="col-sm-8"><input type="number" class="form-control" id="faq-sort" min="0" step="1"/></div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">语言编码：</label>
            <div class="col-sm-8"><select class="form-control" id="faq-lang"></select></div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">内容：</label>
            <div class="col-sm-8"><textarea class="form-control" id="faq-content" rows="8"></textarea></div>
        </div>
    </form>
</div>

<th:block th:include="include :: footer" />
<script th:src="@{/web4x/js/im-table.js?v=20260605j}"></script>
<script th:src="@{/web4x/js/im-faq.js?v=20260605j}"></script>
<script th:inline="javascript">
    $(function () {
        imFaqInitTable(
            [[${@permission.isPermitted('ops:support:faq:view')}]],
            [[${@permission.isPermitted('ops:support:faq:edit')}]],
            [[${@permission.isPermitted('ops:support:faq:delete')}]]
        );
    });
</script>
</body>
</html>
