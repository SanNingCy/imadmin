<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('公告管理配置')" />
    <th:block th:include="include :: datetimepicker-css" />
    <th:block th:include="include :: summernote-css" />
    <style>
        .announce-content-cell { max-width: 200px; }
        #announce-modal .form-group { margin-bottom: 10px; }
        #announce-target-users-display { min-height: 28px; margin-top: 6px; }
        #announce-target-users-display .label { margin-right: 4px; display: inline-block; margin-bottom: 4px; }
        #announce-thumb-preview img { max-width: 80px; max-height: 80px; border: 1px solid #e7eaec; border-radius: 4px; }
    </style>
</head>

<body class="gray-bg">
<div class="container-div">
    <div class="row">
        <div class="col-sm-12 search-collapse">
            <form id="announce-form">
                <div class="select-list">
                    <ul>
                        <li>公告标题：<input type="text" name="noticeTitle"/></li>
                        <li>预览内容：<input type="text" name="previewContent"/></li>
                        <li>
                            是否强弹：
                            <select name="forcePopup">
                                <option value="">所有</option>
                                <option value="1">是</option>
                                <option value="0">否</option>
                            </select>
                        </li>
                        <li th:replace="include :: im-search-time-range('时间范围：', 'startTime', 'endTime')"></li>
                        <li>
                            <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;查询</a>
                            <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                        </li>
                    </ul>
                </div>
            </form>
        </div>

        <div class="btn-group-sm" id="toolbar" role="group">
            <a class="btn btn-success" onclick="imAnnounceOpenModal('add')" shiro:hasPermission="ops:content:announcement:add">
                <i class="fa fa-plus"></i> 新建
            </a>
            <a class="btn btn-primary single disabled" onclick="imAnnounceEditSelected()" shiro:hasPermission="ops:content:announcement:edit">
                <i class="fa fa-edit"></i> 修改
            </a>
            <a class="btn btn-danger multiple disabled" onclick="imAnnounceRemoveSelected()" shiro:hasPermission="ops:content:announcement:delete">
                <i class="fa fa-remove"></i> 删除
            </a>
        </div>

        <div class="col-sm-12 select-table table-striped">
            <table id="bootstrap-table"></table>
        </div>
    </div>
</div>

<!-- 公告编辑弹窗 -->
<div id="announce-modal" style="display:none;">
    <form id="announce-modal-form" class="form-horizontal" style="padding:15px 20px;max-height:70vh;overflow-y:auto;">
        <input type="hidden" id="announce-id"/>
        <input type="hidden" id="announce-imageUrl"/>
        <input type="hidden" id="announce-targetUserIds-json"/>

        <div class="row">
            <div class="col-sm-6">
                <div class="form-group">
                    <label class="col-sm-4 control-label"><span class="text-danger">*</span> 公告标题：</label>
                    <div class="col-sm-8">
                        <input type="text" class="form-control" id="announce-noticeTitle" maxlength="100"/>
                    </div>
                </div>
            </div>
            <div class="col-sm-6">
                <div class="form-group">
                    <label class="col-sm-4 control-label"><span class="text-danger">*</span> 公告状态：</label>
                    <div class="col-sm-8">
                        <select class="form-control" id="announce-status">
                            <option value="">请选择</option>
                            <option value="0">关闭</option>
                            <option value="1">开启</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="col-sm-6">
                <div class="form-group">
                    <label class="col-sm-4 control-label"><span class="text-danger">*</span> 预览内容：</label>
                    <div class="col-sm-8">
                        <textarea class="form-control" id="announce-previewContent" rows="2" maxlength="200"></textarea>
                    </div>
                </div>
            </div>
            <div class="col-sm-6">
                <div class="form-group">
                    <label class="col-sm-4 control-label">目标用户：</label>
                    <div class="col-sm-8">
                        <button type="button" class="btn btn-default btn-sm" id="announce-pick-users-btn" onclick="imAnnounceOpenUserPicker()">
                            <i class="fa fa-users"></i> 选择用户
                        </button>
                        <button type="button" class="btn btn-default btn-sm" id="announce-clear-users-btn" onclick="imAnnounceClearTargetUsers()">清空</button>
                        <div id="announce-target-users-display"></div>
                    </div>
                </div>
            </div>
            <div class="col-sm-6">
                <div class="form-group">
                    <label class="col-sm-4 control-label"><span class="text-danger">*</span> 是否强弹：</label>
                    <div class="col-sm-8">
                        <select class="form-control" id="announce-forcePopup">
                            <option value="">请选择</option>
                            <option value="1">是</option>
                            <option value="0">否</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="col-sm-6">
                <div class="form-group">
                    <label class="col-sm-4 control-label"><span class="text-danger">*</span> 通知次数：</label>
                    <div class="col-sm-8">
                        <input type="number" class="form-control" id="announce-number" min="0" step="1"/>
                    </div>
                </div>
            </div>
            <div class="col-sm-6">
                <div class="form-group">
                    <label class="col-sm-4 control-label">公告缩略图：</label>
                    <div class="col-sm-8">
                        <label class="btn btn-primary btn-sm" id="announce-thumb-upload-btn" style="margin-bottom:0;">
                            上传图片
                            <input type="file" accept="image/*" style="display:none;" onchange="imAnnounceUploadThumb(this)"/>
                        </label>
                        <div id="announce-thumb-preview" style="margin-top:8px;"></div>
                    </div>
                </div>
            </div>
            <div class="col-sm-6">
                <div class="form-group">
                    <label class="col-sm-4 control-label"><span class="text-danger">*</span> 弹窗间隔数：</label>
                    <div class="col-sm-8">
                        <input type="number" class="form-control" id="announce-intervalNumber" min="0" step="1"/>
                    </div>
                </div>
            </div>
            <div class="col-sm-6">
                <div class="form-group">
                    <label class="col-sm-4 control-label"><span class="text-danger">*</span> 弹窗间隔单位：</label>
                    <div class="col-sm-8">
                        <select class="form-control" id="announce-intervalUnit">
                            <option value="">请选择</option>
                            <option value="1">秒</option>
                            <option value="2">分钟</option>
                            <option value="3">小时</option>
                            <option value="4">天</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="col-sm-6">
                <div class="form-group">
                    <label class="col-sm-4 control-label">公告位置：</label>
                    <div class="col-sm-8">
                        <select class="form-control" id="announce-noticeType">
                            <option value="">请选择</option>
                            <option value="1">首页</option>
                            <option value="2">消息页</option>
                            <option value="3">设置页</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="col-sm-6">
                <div class="form-group">
                    <label class="col-sm-4 control-label"><span class="text-danger">*</span> 开始时间：</label>
                    <div class="col-sm-8">
                        <input type="text" class="form-control announce-datetime" id="announce-startTime" placeholder="yyyy-MM-dd HH:mm:ss"/>
                    </div>
                </div>
            </div>
            <div class="col-sm-6">
                <div class="form-group">
                    <label class="col-sm-4 control-label"><span class="text-danger">*</span> 结束时间：</label>
                    <div class="col-sm-8">
                        <input type="text" class="form-control announce-datetime" id="announce-endTime" placeholder="yyyy-MM-dd HH:mm:ss"/>
                    </div>
                </div>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-2 control-label"><span class="text-danger">*</span> 公告内容：</label>
            <div class="col-sm-10">
                <div id="announce-content-editor"></div>
            </div>
        </div>
    </form>
</div>

<!-- 目标用户选择弹窗 -->
<div id="announce-user-picker" style="display:none;padding:12px 16px;">
    <form id="announce-user-search-form" class="form-inline" style="margin-bottom:10px;">
        <div class="form-group" style="margin-right:8px;">
            <input type="text" class="form-control input-sm" name="idno" placeholder="账号"/>
        </div>
        <div class="form-group" style="margin-right:8px;">
            <input type="text" class="form-control input-sm" name="nickname" placeholder="昵称"/>
        </div>
        <button type="button" class="btn btn-primary btn-sm" onclick="imAnnounceSearchUsers()"><i class="fa fa-search"></i> 查询</button>
    </form>
    <table id="announce-user-table"></table>
</div>

<th:block th:include="include :: footer" />
<th:block th:include="include :: datetimepicker-js" />
<th:block th:include="include :: summernote-js" />
<script th:src="@{/web4x/js/im-table.js?v=20260605i}"></script>
<script th:src="@{/web4x/js/im-piamom-common.js}"></script>
<script th:src="@{/web4x/js/im-announcement.js?v=20260605i}"></script>

<script th:inline="javascript">
    window.imFilePath = /*[[${@environment.getProperty('filePath', '')}]]*/ '';
    $(function () {
        imAnnounceInitTable(
            [[${@permission.isPermitted('ops:content:announcement:view')}]],
            [[${@permission.isPermitted('ops:content:announcement:edit')}]],
            [[${@permission.isPermitted('ops:content:announcement:delete')}]]
        );
    });
</script>
</body>
</html>
