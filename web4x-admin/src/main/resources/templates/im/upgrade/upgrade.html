<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('版本更新管理')" />
</head>

<body class="gray-bg">
<div class="container-div">
    <div class="row">
        <div class="col-sm-12 search-collapse">
            <form id="upgrade-form">
                <div class="select-list">
                    <ul>
                        <li>
                            升级编号：<input type="text" name="number"/>
                        </li>
                        <li>
                            版本号：<input type="text" name="version"/>
                        </li>
                        <li>
                            强制更新：
                            <select name="type">
                                <option value="">所有</option>
                                <option value="1">是</option>
                                <option value="0">否</option>
                            </select>
                        </li>
                        <li>
                            <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;查询</a>
                            <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                        </li>
                    </ul>
                </div>
            </form>
        </div>

        <div class="btn-group-sm" id="toolbar" role="group">
            <a class="btn btn-success" onclick="imUpgradeOpenModal('add')" shiro:hasPermission="ops:content:version:add">
                <i class="fa fa-plus"></i> 新增
            </a>
            <a class="btn btn-primary single disabled" onclick="imUpgradeEditSelected()" shiro:hasPermission="ops:content:version:edit">
                <i class="fa fa-edit"></i> 修改
            </a>
            <a class="btn btn-danger multiple disabled" onclick="imUpgradeRemoveSelected()" shiro:hasPermission="ops:content:version:delete">
                <i class="fa fa-remove"></i> 删除
            </a>
            <a class="btn btn-warning" onclick="imUpgradeExport()" shiro:hasPermission="upgrade:upgrade:export">
                <i class="fa fa-download"></i> 导出
            </a>
        </div>

        <div class="col-sm-12 select-table table-striped">
            <table id="bootstrap-table"></table>
        </div>
    </div>
</div>

<!-- 版本更新弹窗（layer type=1 直接渲染此 div） -->
<div id="upgrade-modal" style="display:none;">
    <form id="upgrade-modal-form" class="form-horizontal">
        <input type="hidden" id="upgrade-id"/>

        <div class="form-group">
            <label class="col-sm-3 control-label">升级编号：</label>
            <div class="col-sm-8">
                <input type="number" class="form-control" id="upgrade-number" placeholder="升级编号"/>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label">版本号：</label>
            <div class="col-sm-8">
                <input type="text" class="form-control" id="upgrade-version" placeholder="版本号"/>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label">强制更新：</label>
            <div class="col-sm-8">
                <select class="form-control" id="upgrade-type">
                    <option value="">请选择</option>
                    <option value="1">是</option>
                    <option value="0">否</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label"><span class="text-danger">*</span> 地址：</label>
            <div class="col-sm-8">
                <input type="hidden" id="upgrade-url"/>
                <input type="hidden" id="upgrade-qrCode"/>

                <span id="upgrade-upload-btn">
                    <label class="btn btn-primary btn-sm" style="margin-bottom:0;">
                        点击上传
                        <input type="file" accept=".apk" style="display:none;" onchange="imUpgradeUploadFile(this)"/>
                    </label>
                </span>
                <div id="upgrade-file-wrap" style="display:none;margin-top:8px;">
                    <div style="display:flex;align-items:center;gap:8px;background:#f5f7fa;padding:8px 10px;border-radius:4px;border:1px solid #e7eaec;">
                        <i class="fa fa-paperclip text-muted"></i>
                        <a id="upgrade-file-link" href="javascript:void(0)" target="_blank" rel="noreferrer"
                           style="flex:1;word-break:break-all;margin:0;"></a>
                        <a id="upgrade-file-remove" class="btn btn-default btn-xs" href="javascript:void(0)"
                           title="删除" onclick="imUpgradeRemoveFile()">
                            <i class="fa fa-trash"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label">安装包二维码：</label>
            <div class="col-sm-8" id="upgrade-qr-preview"></div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label">更新内容：</label>
            <div class="col-sm-8">
                <textarea class="form-control" id="upgrade-content" rows="6" placeholder="更新内容"></textarea>
            </div>
        </div>
    </form>
</div>

<th:block th:include="include :: footer" />
<script th:src="@{/web4x/js/im-table.js?v=20260605h}"></script>
<script th:src="@{/web4x/js/im-upgrade.js?v=20260605h}"></script>

<script th:inline="javascript">
    $(function () {
        imUpgradeInitTable(
            [[${@permission.isPermitted('ops:content:version:view')}]],
            [[${@permission.isPermitted('ops:content:version:edit')}]],
            [[${@permission.isPermitted('ops:content:version:delete')}]]
        );
    });
</script>
</body>
</html>
