<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('登录记录审计')" />
</head>
<body class="gray-bg">
<div class="container-div">
    <div class="row">
        <div class="col-sm-12 search-collapse">
            <form id="login-audit-form">
                <div class="select-list">
                    <ul>
                        <li>idno：<input type="text" name="idno"/></li>
                        <li>用户名：<input type="text" name="nickname"/></li>
                        <li>靓号：<input type="text" name="lianghao"/></li>
                        <li>
                            <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;查询</a>
                            <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                        </li>
                    </ul>
                </div>
            </form>
        </div>
        <div class="col-sm-12 select-table table-striped">
            <table id="bootstrap-table"></table>
        </div>
    </div>
</div>

<div id="login-audit-modal" style="display:none;">
    <form id="login-audit-modal-form" class="form-horizontal" style="padding:15px 20px;">
        <div class="form-group">
            <label class="col-sm-3 control-label">用户：</label>
            <div class="col-sm-8"><input type="text" class="form-control" id="login-audit-user" readonly/></div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">ip地址：</label>
            <div class="col-sm-8"><input type="text" class="form-control" id="login-audit-ip" readonly/></div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">城市：</label>
            <div class="col-sm-8"><input type="text" class="form-control" id="login-audit-ipcity" readonly/></div>
        </div>
    </form>
</div>

<th:block th:include="include :: footer" />
<script th:src="@{/web4x/js/im-table.js?v=20260605s}"></script>
<script th:src="@{/web4x/js/im-security-login-audit.js?v=20260605s}"></script>
<script th:inline="javascript">
    $(function () {
        imSecurityLoginAuditInitTable([[${@permission.isPermitted('social:security:login-audit:view')}]]);
    });
</script>
</body>
</html>
