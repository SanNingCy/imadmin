<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('会员码管理')" />
</head>
<body class="gray-bg">
<div class="container-div">
    <div class="row">
        <div class="col-sm-12 search-collapse">
            <form id="vip-code-form">
                <div class="select-list">
                    <ul>
                        <li>兑换码：<input type="text" name="code"/></li>
                        <li>
                            是否已被兑换：
                            <select name="isdui">
                                <option value="">全部</option>
                                <option value="1">是</option>
                                <option value="0">否</option>
                            </select>
                        </li>
                        <li>用户ID：<input type="text" name="idno"/></li>
                        <li>
                            类型名称：
                            <select name="type" id="vip-code-search-type">
                                <option value="">全部</option>
                            </select>
                        </li>
                        <li>
                            同步状态：
                            <select name="syncStatus">
                                <option value="">全部</option>
                                <option value="1">已同步</option>
                                <option value="0">未同步/失败</option>
                            </select>
                        </li>
                        <li>
                            <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;查询</a>
                            <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                        </li>
                    </ul>
                </div>
            </form>
        </div>
        <div class="btn-group-sm" id="toolbar" role="group">
            <a class="btn btn-success" onclick="imSecurityVipCodeOpenModal('add')" shiro:hasPermission="social:security:vip-code:add">
                <i class="fa fa-plus"></i> 新建
            </a>
            <a class="btn btn-primary" onclick="imSecurityVipCodeOpenBatchModal()" shiro:hasPermission="social:security:vip-code:batch">
                <i class="fa fa-plus"></i> 批量生成
            </a>
            <a class="btn btn-info" onclick="imSecurityVipCodeSyncFromIm()" shiro:hasPermission="social:security:vip-code:syncStatus">
                <i class="fa fa-refresh"></i> 批量同步到链桥平台
            </a>
        </div>
        <div class="col-sm-12 select-table table-striped">
            <table id="bootstrap-table"></table>
        </div>
    </div>
</div>

<div id="vip-code-modal" style="display:none;">
    <form id="vip-code-modal-form" class="form-horizontal" style="padding:15px 20px;">
        <input type="hidden" id="vip-code-id"/>
        <div class="form-group">
            <label class="col-sm-3 control-label"><span class="text-danger">*</span> 兑换码：</label>
            <div class="col-sm-8"><input type="text" class="form-control" id="vip-code-code"/></div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label"><span class="text-danger">*</span> 会员天数：</label>
            <div class="col-sm-8"><input type="number" class="form-control" id="vip-code-day" min="1" step="1"/></div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label"><span class="text-danger">*</span> 是否已被兑换：</label>
            <div class="col-sm-8">
                <select class="form-control" id="vip-code-isdui">
                    <option value="0">否</option>
                    <option value="1">是</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label"><span class="text-danger">*</span> 类型：</label>
            <div class="col-sm-8"><select class="form-control" id="vip-code-type"></select></div>
        </div>
    </form>
</div>

<div id="vip-code-batch-modal" style="display:none;">
    <form id="vip-code-batch-form" class="form-horizontal" style="padding:15px 20px;">
        <div class="form-group">
            <label class="col-sm-3 control-label"><span class="text-danger">*</span> 生成数量：</label>
            <div class="col-sm-8"><input type="number" class="form-control" id="vip-code-batch-count" min="1" step="1"/></div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label"><span class="text-danger">*</span> 会员天数：</label>
            <div class="col-sm-8"><input type="number" class="form-control" id="vip-code-batch-day" min="1" step="1"/></div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label"><span class="text-danger">*</span> 类型：</label>
            <div class="col-sm-8"><select class="form-control" id="vip-code-batch-type"></select></div>
        </div>
    </form>
</div>

<th:block th:include="include :: footer" />
<script th:src="@{/web4x/js/im-table.js?v=20260617}"></script>
<script th:src="@{/web4x/js/im-security-vip-code.js?v=20260618}"></script>
<script th:inline="javascript">
    $(function () {
        imSecurityVipCodeInitTable(
            [[${@permission.isPermitted('social:security:vip-code:view')}]],
            [[${@permission.isPermitted('social:security:vip-code:edit')}]],
            [[${@permission.isPermitted('social:security:vip-code:delete')}]]
        );
    });
</script>
</body>
</html>
