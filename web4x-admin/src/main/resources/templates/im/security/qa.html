<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('密保问题管理')" />
</head>
<body class="gray-bg">
<div class="container-div">
    <div class="row">
        <div class="col-sm-12 search-collapse">
            <form id="qa-form">
                <div class="select-list">
                    <ul>
                        <li>问题：<input type="text" name="title"/></li>
                        <li>
                            <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;查询</a>
                            <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                        </li>
                    </ul>
                </div>
            </form>
        </div>
        <div class="btn-group-sm" id="toolbar" role="group">
            <a class="btn btn-success" onclick="imSecurityQaOpenModal('add')" shiro:hasPermission="social:security:qa:add">
                <i class="fa fa-plus"></i> 新建
            </a>
        </div>
        <div class="col-sm-12 select-table table-striped">
            <table id="bootstrap-table"></table>
        </div>
    </div>
</div>

<div id="qa-modal" style="display:none;">
    <form id="qa-modal-form" class="form-horizontal" style="padding:15px 20px;">
        <input type="hidden" id="qa-id"/>
        <div class="form-group">
            <label class="col-sm-3 control-label">排序：</label>
            <div class="col-sm-8"><input type="number" class="form-control" id="qa-sort" min="0" step="1"/></div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label"><span class="text-danger">*</span> 问题：</label>
            <div class="col-sm-8"><input type="text" class="form-control" id="qa-title"/></div>
        </div>
    </form>
</div>

<th:block th:include="include :: footer" />
<script th:src="@{/web4x/js/im-table.js?v=20260605s}"></script>
<script th:src="@{/web4x/js/im-security-qa.js?v=20260605s}"></script>
<script th:inline="javascript">
    $(function () {
        imSecurityQaInitTable(
            [[${@permission.isPermitted('social:security:qa:view')}]],
            [[${@permission.isPermitted('social:security:qa:edit')}]],
            [[${@permission.isPermitted('social:security:qa:delete')}]]
        );
    });
</script>
</body>
</html>
