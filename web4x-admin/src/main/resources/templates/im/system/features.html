<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('功能开关管理')" />
</head>
<body class="gray-bg">
<div class="container-div">
    <div class="row">
        <div class="col-sm-12 search-collapse">
            <form id="features-form">
                <div class="select-list">
                    <ul>
                        <li>按钮名称：<input type="text" name="buttonName"/></li>
                        <li>权限标识：<input type="text" name="buttonKey"/></li>
                        <li>
                            <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;查询</a>
                            <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                        </li>
                    </ul>
                </div>
            </form>
        </div>
        <div class="btn-group-sm" id="toolbar" role="group">
            <a class="btn btn-success" onclick="imFeaturesOpenModal('add')" shiro:hasPermission="ops:system:features:add">
                <i class="fa fa-plus"></i> 新建
            </a>
            <a class="btn btn-primary single disabled" onclick="imFeaturesEditSelected()" shiro:hasPermission="ops:system:features:edit">
                <i class="fa fa-edit"></i> 修改
            </a>
            <a class="btn btn-danger multiple disabled" onclick="imFeaturesRemoveSelected()" shiro:hasPermission="ops:system:features:delete">
                <i class="fa fa-remove"></i> 删除
            </a>
        </div>
        <div class="col-sm-12 select-table table-striped">
            <table id="bootstrap-table"></table>
        </div>
    </div>
</div>

<div id="features-modal" style="display:none;">
    <form id="features-modal-form" class="form-horizontal" style="padding:15px 20px;">
        <input type="hidden" id="features-id"/>
        <div class="form-group">
            <label class="col-sm-3 control-label"><span class="text-danger">*</span> 按钮名称：</label>
            <div class="col-sm-8"><input type="text" class="form-control" id="features-buttonName"/></div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label"><span class="text-danger">*</span> 权限标识：</label>
            <div class="col-sm-8"><input type="text" class="form-control" id="features-buttonKey"/></div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label"><span class="text-danger">*</span> 开关：</label>
            <div class="col-sm-8">
                <select class="form-control" id="features-buttonStatus">
                    <option value="1">已开启</option>
                    <option value="0">已关闭</option>
                </select>
            </div>
        </div>
    </form>
</div>

<th:block th:include="include :: footer" />
<script th:src="@{/web4x/js/im-table.js?v=20260605k}"></script>
<script th:src="@{/web4x/js/im-features.js?v=20260605k}"></script>
<script th:inline="javascript">
    $(function () {
        imFeaturesInitTable(
            [[${@permission.isPermitted('ops:system:features:view')}]],
            [[${@permission.isPermitted('ops:system:features:edit')}]],
            [[${@permission.isPermitted('ops:system:features:delete')}]]
        );
    });
</script>
</body>
</html>
