<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('广场发帖信用分额度')" />
    <style>
        .piamom-table-wrap { overflow-x: auto; }
        #publish-quota-modal .form-group { margin-bottom: 12px; }
    </style>
</head>
<body class="gray-bg">
<div class="container-div">
    <div class="row">
        <div class="btn-group-sm" id="toolbar" role="group">
            <a class="btn btn-success" onclick="imPiamomPublishQuotaOpenModal('add')" shiro:hasPermission="piamom:square:publish-quota:add">
                <i class="fa fa-plus"></i> 新建
            </a>
            <a class="btn btn-primary" onclick="$('#bootstrap-table').bootstrapTable('refresh')">
                <i class="fa fa-refresh"></i> 刷新
            </a>
        </div>
        <div class="col-sm-12 select-table table-striped piamom-table-wrap">
            <table id="bootstrap-table"></table>
        </div>
    </div>
</div>

<div id="publish-quota-modal" style="display:none;padding:15px 20px;">
    <form id="publish-quota-modal-form">
        <input type="hidden" id="publish-quota-id"/>
        <div class="form-group">
            <label>信用分下限（含） <span class="text-danger">*</span></label>
            <input type="number" class="form-control" id="publish-quota-creditMin"/>
        </div>
        <div class="form-group">
            <label>信用分上限（含）</label>
            <input type="number" class="form-control" id="publish-quota-creditMax" placeholder="留空表示无上限"/>
        </div>
        <div class="form-group">
            <label>每日可发帖数 <span class="text-danger">*</span></label>
            <input type="number" class="form-control" id="publish-quota-dailyLimit" min="0"/>
        </div>
        <div class="form-group">
            <label>排序权重 <span class="text-danger">*</span></label>
            <input type="number" class="form-control" id="publish-quota-sortOrder"/>
        </div>
        <div class="form-group">
            <label>状态 <span class="text-danger">*</span></label>
            <select class="form-control" id="publish-quota-status">
                <option value="1">启用</option>
                <option value="0">停用</option>
            </select>
        </div>
    </form>
</div>

<th:block th:include="include :: footer" />
<script th:src="@{/web4x/js/im-table.js?v=20260605s}"></script>
<script th:src="@{/web4x/js/im-piamom-common.js?v=20260605s}"></script>
<script th:src="@{/web4x/js/im-piamom-square-publish-quota.js?v=20260605s}"></script>
<script th:inline="javascript">
    $(function () {
        imPiamomPublishQuotaInitTable(
            [[${@permission.isPermitted('piamom:square:publish-quota:view')}]],
            [[${@permission.isPermitted('piamom:square:publish-quota:edit')}]],
            [[${@permission.isPermitted('piamom:square:publish-quota:delete')}]]
        );
    });
</script>
</body>
</html>
