<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('广场列表')" />
    <style>
        .piamom-media-cell {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            max-width: 280px;
            align-items: flex-start;
            justify-content: flex-start;
        }
        .piamom-media-img {
            object-fit: cover;
            border-radius: 4px;
            cursor: pointer;
            flex-shrink: 0;
            background: #f5f5f5;
        }
        .piamom-media-fallback {
            display: inline-block;
            font-size: 12px;
            line-height: 40px;
            padding: 0 6px;
            color: #337ab7;
        }
        .piamom-video-link {
            display: inline-block;
            font-size: 12px;
            line-height: 40px;
            padding: 0 6px;
            color: #337ab7;
        }
        .piamom-table-wrap { overflow-x: auto; }
        .piamom-detail-table td:first-child { width: 140px; font-weight: 600; background: #f9f9f9; }
        .piamom-drawer-tabs { margin-bottom: 10px; }
        .piamom-drawer-tabs .tab-pane { padding-top: 10px; }
    </style>
</head>
<body class="gray-bg">
<div class="container-div">
    <div class="row">
        <div class="col-sm-12 search-collapse">
            <form id="piamom-square-list-form">
                <div class="select-list">
                    <ul>
                        <li>帖子ID：<input type="text" name="id"/></li>
                        <li>IDNO：<input type="text" name="userIdno"/></li>
                        <li>
                            类型：
                            <select name="type">
                                <option value="">全部</option>
                                <option value="1">图片</option>
                                <option value="2">视频</option>
                            </select>
                        </li>
                        <li>
                            质押状态：
                            <select name="odicStakeStatus">
                                <option value="">全部</option>
                                <option value="0">质押中</option>
                                <option value="1">已退还</option>
                                <option value="2">举报没收</option>
                            </select>
                        </li>
                        <li>
                            置顶：
                            <select name="isTop">
                                <option value="">全部</option>
                                <option value="0">否</option>
                                <option value="1">是</option>
                            </select>
                        </li>
                        <li>内容：<input type="text" name="content" placeholder="关键词"/></li>
                        <li>
                            <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;查询</a>
                            <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                        </li>
                    </ul>
                </div>
            </form>
        </div>
        <div class="col-sm-12 select-table table-striped piamom-table-wrap">
            <table id="bootstrap-table"></table>
        </div>
    </div>
</div>

<div id="piamom-square-detail-modal" style="display:none;padding:15px 20px;">
    <table class="table table-bordered piamom-detail-table">
        <tbody>
        <tr><td>ID</td><td id="psd-id"></td></tr>
        <tr><td>IDNO</td><td id="psd-userIdno"></td></tr>
        <tr><td>昵称</td><td id="psd-userNickname"></td></tr>
        <tr><td>类型</td><td id="psd-type"></td></tr>
        <tr><td>内容</td><td id="psd-content"></td></tr>
        <tr><td>媒体</td><td id="psd-media"></td></tr>
        <tr><td>质押 ODIC 与状态</td><td id="psd-stake"></td></tr>
        <tr><td>评论门槛</td><td id="psd-commentGate"></td></tr>
        <tr><td>评论最低信用分</td><td id="psd-commentCreditMin"></td></tr>
        <tr><td>置顶</td><td id="psd-top"></td></tr>
        <tr><td>状态</td><td id="psd-status"></td></tr>
        <tr><td>创建时间</td><td id="psd-createdAt"></td></tr>
        </tbody>
    </table>
</div>

<div id="piamom-square-interaction-drawer" style="display:none;padding:10px 15px;">
    <h4 id="piamom-square-interaction-title" style="margin-top:0;"></h4>
    <ul class="nav nav-tabs piamom-drawer-tabs">
        <li class="active"><a data-toggle="tab" href="#piamom-square-tab-comment">评论</a></li>
        <li><a data-toggle="tab" href="#piamom-square-tab-like">点赞</a></li>
    </ul>
    <div class="tab-content">
        <div id="piamom-square-tab-comment" class="tab-pane active">
            <div class="select-table table-striped">
                <table id="piamom-square-drawer-comment-table"></table>
            </div>
        </div>
        <div id="piamom-square-tab-like" class="tab-pane">
            <div class="select-table table-striped">
                <table id="piamom-square-drawer-like-table"></table>
            </div>
        </div>
    </div>
</div>

<th:block th:include="include :: footer" />
<script th:src="@{/web4x/js/im-table.js?v=20260605s}"></script>
<script th:src="@{/web4x/js/im-piamom-common.js?v=20260605s}"></script>
<script th:src="@{/web4x/js/im-piamom-square-list.js?v=20260605s}"></script>
<script th:inline="javascript">
    window.imFilePath = /*[[${@environment.getProperty('filePath', '')}]]*/ '';
    $(function () {
        imPiamomSquareListInitTable(
            [[${@permission.isPermitted('piamom:square:list:view')}]],
            [[${@permission.isPermitted('piamom:square:list:edit')}]],
            [[${@permission.isPermitted('piamom:square:list:delete')}]]
        );
    });
</script>
</body>
</html>
