<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('广场热门配置')" />
    <style>
        .piamom-table-wrap { overflow-x: auto; }
        #hot-config-modal .form-group { margin-bottom: 10px; }
    </style>
</head>
<body class="gray-bg">
<div class="container-div">
    <div class="row">
        <div class="btn-group-sm" id="toolbar" role="group">
            <a class="btn btn-success" onclick="imPiamomHotConfigOpenModal('add')" shiro:hasPermission="piamom:square:hot-config:add">
                <i class="fa fa-plus"></i> 新建
            </a>
            <a class="btn btn-primary" onclick="$('#bootstrap-table').bootstrapTable('refresh')">
                <i class="fa fa-refresh"></i> 刷新
            </a>
        </div>
        <div class="col-sm-12 select-table table-striped piamom-table-wrap">
            <table id="bootstrap-table"></table>
        </div>
    </div>
</div>

<div id="hot-config-modal" style="display:none;padding:15px 20px;max-height:560px;overflow-y:auto;">
    <form id="hot-config-modal-form">
        <input type="hidden" id="hot-config-id"/>
        <div class="form-group">
            <label>点赞阈值 <span class="text-danger">*</span></label>
            <input type="number" class="form-control" id="hot-config-likeThreshold" min="0"/>
        </div>
        <div class="form-group">
            <label>浏览阈值 <span class="text-danger">*</span></label>
            <input type="number" class="form-control" id="hot-config-viewThreshold" min="0"/>
        </div>
        <div class="form-group">
            <label>质押 ODIC 总额 <span class="text-danger">*</span></label>
            <input type="number" class="form-control" id="hot-config-totalOdicStake" min="0" step="0.01"/>
        </div>
        <div class="form-group">
            <label>质押提示</label>
            <input type="text" class="form-control" id="hot-config-stakeTip"/>
        </div>
        <div class="form-group">
            <label>质押规则标题</label>
            <input type="text" class="form-control" id="hot-config-stakeRuleTitle"/>
        </div>
        <div class="form-group">
            <label>质押规则内容</label>
            <textarea class="form-control" id="hot-config-stakeRuleContent" rows="3"></textarea>
        </div>
        <div class="form-group">
            <label>审核规则标题</label>
            <input type="text" class="form-control" id="hot-config-auditRuleTitle"/>
        </div>
        <div class="form-group">
            <label>审核规则内容</label>
            <textarea class="form-control" id="hot-config-auditRuleContent" rows="3"></textarea>
        </div>
        <div class="form-group">
            <label>举报页投诉说明（HTML）</label>
            <textarea class="form-control" id="hot-config-complaintNotice" rows="5"></textarea>
        </div>
        <div class="form-group">
            <label>发布广场最低信用分</label>
            <input type="number" class="form-control" id="hot-config-creditMin"/>
        </div>
        <div class="form-group">
            <label>发布广场最高信用分</label>
            <input type="number" class="form-control" id="hot-config-creditMax" placeholder="留空表示无上限"/>
        </div>
        <div class="form-group">
            <label>状态 <span class="text-danger">*</span></label>
            <select class="form-control" id="hot-config-status">
                <option value="1">启用</option>
                <option value="0">停用</option>
            </select>
        </div>
    </form>
</div>

<th:block th:include="include :: footer" />
<script th:src="@{/web4x/js/im-table.js?v=20260605s}"></script>
<script th:src="@{/web4x/js/im-piamom-common.js?v=20260605s}"></script>
<script th:src="@{/web4x/js/im-piamom-square-hot-config.js?v=20260605s}"></script>
<script th:inline="javascript">
    $(function () {
        imPiamomHotConfigInitTable(
            [[${@permission.isPermitted('piamom:square:hot-config:view')}]],
            [[${@permission.isPermitted('piamom:square:hot-config:edit')}]],
            [[${@permission.isPermitted('piamom:square:hot-config:delete')}]]
        );
    });
</script>
</body>
</html>
