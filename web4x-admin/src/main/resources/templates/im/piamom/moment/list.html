<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('朋友圈列表')" />
    <style>
        .piamom-table-wrap .piamom-media-cell--compact {
            display: flex;
            flex-wrap: nowrap;
            gap: 4px;
            align-items: center;
            max-width: 188px;
            line-height: 0;
            overflow: hidden;
        }
        .piamom-table-wrap .piamom-media-cell--compact .piamom-media-img,
        .piamom-table-wrap .piamom-media-cell--compact .piamom-media-more {
            width: 44px;
            height: 44px;
            flex-shrink: 0;
            border-radius: 4px;
            background: #f5f5f5;
        }
        .piamom-table-wrap .piamom-media-cell--compact .piamom-media-img {
            object-fit: cover;
            cursor: pointer;
        }
        .piamom-table-wrap .piamom-media-cell--compact .piamom-media-more {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.55);
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
        }
        .piamom-table-wrap .piamom-media-cell--compact .piamom-media-more:hover {
            background: rgba(0, 0, 0, 0.7);
        }
        .piamom-table-wrap .piamom-media-fallback {
            display: inline-block;
            font-size: 12px;
            line-height: 44px;
            padding: 0 6px;
            color: #337ab7;
        }
        #piamom-moment-detail-modal .piamom-media-cell {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: flex-start;
        }
        #piamom-moment-detail-modal .piamom-media-img {
            width: 72px;
            height: 72px;
            object-fit: cover;
            border-radius: 4px;
            cursor: pointer;
            background: #f5f5f5;
        }
        .piamom-table-wrap { overflow-x: auto; }
        .piamom-detail-table td:first-child { width: 120px; font-weight: 600; background: #f9f9f9; }
        .piamom-drawer-tabs { margin-bottom: 10px; }
        .piamom-drawer-tabs .tab-pane { padding-top: 10px; }
    </style>
</head>
<body class="gray-bg">
<div class="container-div">
    <div class="row">
        <div class="col-sm-12 search-collapse">
            <form id="piamom-moment-list-form">
                <div class="select-list">
                    <ul>
                        <li>动态ID：<input type="text" name="id"/></li>
                        <li>用户ID：<input type="text" name="userId"/></li>
                        <li>IDNO：<input type="text" name="userIdno"/></li>
                        <li>
                            置顶：
                            <select name="isTop">
                                <option value="">全部</option>
                                <option value="0">否</option>
                                <option value="1">是</option>
                            </select>
                        </li>
                        <li>内容：<input type="text" name="content" placeholder="关键词"/></li>
                        <li>
                            <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;查询</a>
                            <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                        </li>
                    </ul>
                </div>
            </form>
        </div>
        <div class="col-sm-12 select-table table-striped piamom-table-wrap">
            <table id="bootstrap-table"></table>
        </div>
    </div>
</div>

<div id="piamom-moment-detail-modal" style="display:none;padding:15px 20px;">
    <table class="table table-bordered piamom-detail-table">
        <tbody>
        <tr><td>ID</td><td id="pmd-id"></td></tr>
        <tr><td>用户ID</td><td id="pmd-userId"></td></tr>
        <tr><td>IDNO</td><td id="pmd-userIdno"></td></tr>
        <tr><td>昵称</td><td id="pmd-userNickname"></td></tr>
        <tr><td>内容</td><td id="pmd-content"></td></tr>
        <tr><td>图片</td><td id="pmd-images"></td></tr>
        <tr><td>浏览/赞/评/引用</td><td id="pmd-stats"></td></tr>
        <tr><td>置顶</td><td id="pmd-top"></td></tr>
        <tr><td>状态</td><td id="pmd-status"></td></tr>
        <tr><td>创建时间</td><td id="pmd-createdAt"></td></tr>
        </tbody>
    </table>
</div>

<div id="piamom-moment-interaction-drawer" style="display:none;padding:10px 15px;">
    <h4 id="piamom-interaction-title" style="margin-top:0;"></h4>
    <ul class="nav nav-tabs piamom-drawer-tabs">
        <li class="active"><a data-toggle="tab" href="#piamom-tab-comment">评论</a></li>
        <li><a data-toggle="tab" href="#piamom-tab-like">点赞</a></li>
    </ul>
    <div class="tab-content">
        <div id="piamom-tab-comment" class="tab-pane active">
            <div class="select-table table-striped">
                <table id="piamom-drawer-comment-table"></table>
            </div>
        </div>
        <div id="piamom-tab-like" class="tab-pane">
            <div class="select-table table-striped">
                <table id="piamom-drawer-like-table"></table>
            </div>
        </div>
    </div>
</div>

<th:block th:include="include :: footer" />
<script th:src="@{/web4x/js/im-table.js?v=20260605p4}"></script>
<script th:src="@{/web4x/js/im-piamom-common.js?v=20260614}"></script>
<script th:src="@{/web4x/js/im-piamom-moment-list.js?v=20260614}"></script>
<script th:inline="javascript">
    window.imFilePath = /*[[${@environment.getProperty('filePath', '')}]]*/ '';
    $(function () {
        imPiamomMomentListInitTable(
            [[${@permission.isPermitted('piamom:moment:list:view')}]],
            [[${@permission.isPermitted('piamom:moment:list:edit')}]],
            [[${@permission.isPermitted('piamom:moment:list:delete')}]]
        );
    });
</script>
</body>
</html>
