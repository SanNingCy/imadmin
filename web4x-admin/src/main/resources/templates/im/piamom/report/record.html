<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('举报记录审核')" />
    <style>
        .piamom-detail-table td:first-child { width: 140px; font-weight: 600; background: #f9f9f9; }
        .piamom-drawer-tabs { margin-bottom: 10px; }
        .piamom-drawer-tabs .tab-pane { padding-top: 10px; }
        .report-record-tip { color: #888; margin: 0 0 10px; font-size: 13px; }
    </style>
</head>
<body class="gray-bg">
<input type="hidden" id="report-record-audit-user-id" th:value="${auditUserId}"/>

<div class="container-div">
    <div class="row">
        <div class="col-sm-12 search-collapse">
            <form id="piamom-report-record-form">
                <div class="select-list">
                    <ul>
                        <li>记录ID：<input type="text" name="id"/></li>
                        <li>举报人ID号：<input type="text" name="reporterIdno"/></li>
                        <li>
                            对象类型：
                            <select name="targetType">
                                <option value="">全部</option>
                                <option value="moment">朋友圈</option>
                                <option value="square">广场</option>
                            </select>
                        </li>
                        <li>对象ID：<input type="text" name="targetId"/></li>
                        <li>
                            审核状态：
                            <select name="auditStatus">
                                <option value="">全部</option>
                                <option value="0">待审核</option>
                                <option value="1">通过</option>
                                <option value="2">驳回</option>
                            </select>
                        </li>
                        <li>
                            <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;查询</a>
                            <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                        </li>
                    </ul>
                </div>
            </form>
        </div>
        <p class="col-sm-12 report-record-tip">审核通过将下架帖子；广场帖质押中时将改为「举报没收」。</p>
        <div class="col-sm-12 select-table table-striped piamom-table-wrap">
            <table id="bootstrap-table"></table>
        </div>
    </div>
</div>

<div id="report-record-detail-modal" class="im-media-detail-modal" style="display:none;padding:15px 20px;max-height:560px;overflow-y:auto;">
    <table class="table table-bordered piamom-detail-table">
        <tbody>
        <tr><td>ID</td><td id="rrd-id"></td></tr>
        <tr><td>审核状态</td><td id="rrd-auditStatus"></td></tr>
        <tr><td>举报人</td><td id="rrd-reporterNickname"></td></tr>
        <tr><td>举报人ID号</td><td id="rrd-reporterIdno"></td></tr>
        <tr><td>举报类型</td><td id="rrd-reportTypeName"></td></tr>
        <tr><td>对象</td><td id="rrd-target"></td></tr>
        <tr><td>原因</td><td id="rrd-reason"></td></tr>
        <tr><td>举证图</td><td id="rrd-images"></td></tr>
        <tr><td>发布者</td><td id="rrd-publisherNickname"></td></tr>
        <tr><td>发布者ID号</td><td id="rrd-publisherIdno"></td></tr>
        <tr><td>帖子ID</td><td id="rrd-postId"></td></tr>
        <tr><td>帖子质押</td><td id="rrd-postStatus"></td></tr>
        <tr><td>帖子展示</td><td id="rrd-postVisibleStatus"></td></tr>
        <tr><td>帖子正文</td><td id="rrd-postContent"></td></tr>
        <tr><td>帖子媒体</td><td id="rrd-postMedia"></td></tr>
        </tbody>
    </table>
    <div id="report-record-detail-actions" class="text-right" style="margin-top:12px;display:none;">
        <button type="button" class="btn btn-default btn-sm" onclick="imPiamomReportRecordCloseDetail()">关闭</button>
        <button type="button" class="btn btn-info btn-sm" id="report-record-btn-interaction" style="display:none;" onclick="imPiamomReportRecordOpenDetailInteraction()">查看帖子评论/点赞</button>
        <button type="button" class="btn btn-danger btn-sm" id="report-record-btn-approve" style="display:none;" onclick="imPiamomReportRecordAudit(1)">审核通过</button>
        <button type="button" class="btn btn-warning btn-sm" id="report-record-btn-reject" style="display:none;" onclick="imPiamomReportRecordAudit(2)">驳回</button>
    </div>
</div>

<div id="report-record-interaction-drawer" style="display:none;padding:10px 15px;">
    <h4 id="report-record-interaction-title" style="margin-top:0;"></h4>
    <ul class="nav nav-tabs piamom-drawer-tabs">
        <li class="active"><a data-toggle="tab" href="#report-record-tab-comment">评论</a></li>
        <li><a data-toggle="tab" href="#report-record-tab-like">点赞</a></li>
    </ul>
    <div class="tab-content">
        <div id="report-record-tab-comment" class="tab-pane active">
            <div class="select-table table-striped">
                <table id="report-record-drawer-comment-table"></table>
            </div>
        </div>
        <div id="report-record-tab-like" class="tab-pane">
            <div class="select-table table-striped">
                <table id="report-record-drawer-like-table"></table>
            </div>
        </div>
    </div>
</div>

<th:block th:include="include :: footer" />
<script th:src="@{/web4x/js/im-table.js?v=20260605r}"></script>
<script th:src="@{/web4x/js/im-piamom-common.js?v=20260614}"></script>
<script th:src="@{/web4x/js/im-piamom-report-record.js?v=20260614}"></script>
<script th:inline="javascript">
    window.imFilePath = /*[[${@environment.getProperty('filePath', '')}]]*/ '';
    $(function () {
        imPiamomReportRecordInitTable(
            [[${@permission.isPermitted('piamom:report:record:view')}]],
            [[${@permission.isPermitted('piamom:report:record:edit')}]]
        );
    });
</script>
</body>
</html>
