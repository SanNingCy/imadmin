<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('信用分基础配置')" />
    <th:block th:include="include :: summernote-css" />
    <style>
        #credit-config-modal .form-group { margin-bottom: 10px; }
        .credit-config-table-wrap { overflow-x: auto; }
        #credit-config-scoreInfo-editor { min-height: 220px; }
    </style>
</head>
<body class="gray-bg">
<div class="container-div">
    <div class="row">
        <div class="col-sm-12 search-collapse">
            <form id="credit-config-form">
                <div class="select-list">
                    <ul>
                        <li>id：<input type="text" name="id"/></li>
                        <li>初始分：<input type="text" name="initScore" placeholder="精确匹配"/></li>
                        <li>价格：<input type="text" name="price" placeholder="精确匹配"/></li>
                        <li>
                            <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;查询</a>
                            <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                        </li>
                    </ul>
                </div>
            </form>
        </div>
        <div class="col-sm-12 select-table table-striped credit-config-table-wrap">
            <table id="bootstrap-table"></table>
        </div>
    </div>
</div>

<div id="credit-config-modal" style="display:none;">
    <form id="credit-config-modal-form" class="form-horizontal" style="padding:15px 20px;max-height:70vh;overflow-y:auto;">
        <input type="hidden" id="credit-config-id"/>
        <div class="form-group">
            <label class="col-sm-3 control-label">初始分：</label>
            <div class="col-sm-8">
                <input type="number" class="form-control" id="credit-config-initScore" min="0" step="0.01" placeholder="请输入初始分"/>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">会员加成：</label>
            <div class="col-sm-8">
                <input type="number" class="form-control" id="credit-config-vipBonusRate" min="0" step="0.0001" placeholder="请输入会员加成"/>
                <span class="help-block m-b-none">输入 0.15 表示 15%</span>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">靓号加成：</label>
            <div class="col-sm-8">
                <input type="number" class="form-control" id="credit-config-lianghaoBonusRate" min="0" step="0.0001" placeholder="请输入靓号加成"/>
                <span class="help-block m-b-none">输入 0.15 表示 15%</span>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">价格：</label>
            <div class="col-sm-8">
                <div class="input-group">
                    <input type="number" class="form-control" id="credit-config-price" min="0" step="0.01" placeholder="请输入价格"/>
                    <span class="input-group-addon">ODIC</span>
                </div>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">信用分说明：</label>
            <div class="col-sm-8">
                <div id="credit-config-scoreInfo-editor"></div>
            </div>
        </div>
    </form>
</div>

<th:block th:include="include :: footer" />
<th:block th:include="include :: summernote-js" />
<script th:src="@{/web4x/js/im-table.js?v=20260605r}"></script>
<script th:src="@{/web4x/js/im-credit-common.js?v=20260605r}"></script>
<script th:src="@{/web4x/js/im-credit-configuration.js?v=20260613}"></script>
<script th:inline="javascript">
    $(function () {
        imCreditConfigurationInitTable(
            [[${@permission.isPermitted('social:credit:configuration:view')}]],
            [[${@permission.isPermitted('social:credit:configuration:edit')}]],
            [[${@permission.isPermitted('social:credit:configuration:delete')}]]
        );
    });
</script>
</body>
</html>
