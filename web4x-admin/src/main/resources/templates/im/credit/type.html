<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('信用分类型配置')" />
    <style>
        .credit-type-table-wrap { overflow-x: auto; }
        #credit-type-modal .form-group { margin-bottom: 12px; }
    </style>
</head>
<body class="gray-bg">
<div class="container-div">
    <div class="row">
        <div class="col-sm-12 search-collapse">
            <form id="credit-type-form">
                <div class="select-list">
                    <ul>
                        <li>
                            类型：
                            <select name="type" id="credit-type-search-type"></select>
                        </li>
                        <li>
                            状态：
                            <select name="status">
                                <option value="">全部</option>
                                <option value="1">启用</option>
                                <option value="0">禁用</option>
                            </select>
                        </li>
                        <li>
                            <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;查询</a>
                            <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                        </li>
                    </ul>
                </div>
            </form>
        </div>

        <div class="btn-group-sm" id="toolbar" role="group">
            <a class="btn btn-success" onclick="imCreditTypeOpenModal('add')" shiro:hasPermission="social:credit:type:add">
                <i class="fa fa-plus"></i> 新建
            </a>
        </div>

        <div class="col-sm-12 select-table table-striped credit-type-table-wrap">
            <table id="bootstrap-table"></table>
        </div>
    </div>
</div>

<div id="credit-type-modal" style="display:none;">
    <form id="credit-type-modal-form" class="form-horizontal" style="padding:15px 20px;">
        <input type="hidden" id="credit-type-id"/>
        <div class="form-group">
            <label class="col-sm-4 control-label"><span class="text-danger">*</span> 类型：</label>
            <div class="col-sm-7">
                <select class="form-control" id="credit-type-type"></select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-4 control-label"><span class="text-danger">*</span> 总上限：</label>
            <div class="col-sm-7">
                <input type="number" class="form-control" id="credit-type-maxLimit" min="0" step="0.01"/>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-4 control-label"><span class="text-danger">*</span> 基础分数：</label>
            <div class="col-sm-7">
                <input type="number" class="form-control" id="credit-type-score" min="0" step="0.01"/>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-4 control-label"><span class="text-danger">*</span> 状态：</label>
            <div class="col-sm-7">
                <select class="form-control" id="credit-type-status">
                    <option value="1">启用</option>
                    <option value="0">禁用</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-4 control-label"><span class="text-danger">*</span> 排序值：</label>
            <div class="col-sm-7">
                <input type="number" class="form-control" id="credit-type-orderNum" min="0" step="1"/>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-4 control-label"><span class="text-danger">*</span> 构成展示：</label>
            <div class="col-sm-7">
                <select class="form-control" id="credit-type-constituteShow">
                    <option value="1">展示</option>
                    <option value="0">不展示</option>
                </select>
            </div>
        </div>
    </form>
</div>

<th:block th:include="include :: footer" />
<script th:src="@{/web4x/js/im-table.js?v=20260605r}"></script>
<script th:src="@{/web4x/js/im-credit-common.js?v=20260605r}"></script>
<script th:src="@{/web4x/js/im-credit-type.js?v=20260605r}"></script>
<script th:inline="javascript">
    $(function () {
        imCreditTypeInitTable(
            [[${@permission.isPermitted('social:credit:type:view')}]],
            [[${@permission.isPermitted('social:credit:type:edit')}]],
            [[${@permission.isPermitted('social:credit:type:delete')}]]
        );
    });
</script>
</body>
</html>
