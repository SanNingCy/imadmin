<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('用户谷歌安全验证')" />
    <style>
        .gv-table-wrap { overflow-x: auto; }
    </style>
</head>
<body class="gray-bg">
<div class="container-div">
    <div class="row">
        <div class="col-sm-12 search-collapse">
            <form id="google-verify-form">
                <div class="select-list">
                    <ul>
                        <li>账户名：<input type="text" name="acount"/></li>
                        <li>用户昵称：<input type="text" name="nickname"/></li>
                        <li>
                            状态：
                            <select name="state">
                                <option value="">全部</option>
                                <option value="0">正常</option>
                                <option value="1">禁用</option>
                            </select>
                        </li>
                        <li>ID号：<input type="text" name="idno"/></li>
                        <li th:replace="include :: im-search-time-range('创建时间：', 'beginCreateDate', 'endCreateDate')"></li>
                        <li>
                            <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;查询</a>
                            <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                        </li>
                    </ul>
                </div>
            </form>
        </div>
        <div class="col-sm-12 select-table table-striped gv-table-wrap">
            <table id="bootstrap-table"></table>
        </div>
    </div>
</div>

<th:block th:include="include :: footer" />
<script th:src="@{/web4x/js/im-table.js?v=20260605k}"></script>
<script th:src="@{/web4x/js/im-risk-google-verify.js?v=20260605k}"></script>
<script th:inline="javascript">
    $(function () {
        imRiskGoogleVerifyInitTable([[${@permission.isPermitted('risk:security:google-verify:reset')}]]);
    });
</script>
</body>
</html>
