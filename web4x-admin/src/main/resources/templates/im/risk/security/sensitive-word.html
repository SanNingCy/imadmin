<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('全局敏感词')" />
</head>
<body class="gray-bg">
<div class="container-div">
    <div class="row">
        <div class="col-sm-12 search-collapse">
            <form id="sensitive-word-form">
                <div class="select-list">
                    <ul>
                        <li>敏感词：<input type="text" name="word"/></li>
                        <li>
                            <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;查询</a>
                            <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                        </li>
                    </ul>
                </div>
            </form>
        </div>
        <div class="btn-group-sm" id="toolbar" role="group">
            <a class="btn btn-success" onclick="imRiskSensitiveWordOpenModal('add')" shiro:hasPermission="risk:security:sensitive-word:add">
                <i class="fa fa-plus"></i> 新建
            </a>
        </div>
        <div class="col-sm-12 select-table table-striped">
            <table id="bootstrap-table"></table>
        </div>
    </div>
</div>

<div id="sensitive-word-modal" style="display:none;">
    <form id="sensitive-word-modal-form" class="form-horizontal" style="padding:15px 20px;">
        <input type="hidden" id="sw-id"/>
        <div id="sw-add-block">
            <div class="form-group">
                <label class="col-sm-3 control-label"><span class="text-danger">*</span> 敏感词：</label>
                <div class="col-sm-8">
                    <textarea class="form-control" id="sw-words" rows="8" placeholder="支持换行、英文逗号、中文逗号分隔，可批量录入"></textarea>
                    <p class="help-block">支持换行、英文逗号、中文逗号分隔，新增时可一次录入多个</p>
                </div>
            </div>
        </div>
        <div id="sw-edit-block" style="display:none;">
            <div class="form-group">
                <label class="col-sm-3 control-label">ID：</label>
                <div class="col-sm-8"><input type="text" class="form-control" id="sw-id-display" readonly/></div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label"><span class="text-danger">*</span> 敏感词：</label>
                <div class="col-sm-8"><input type="text" class="form-control" id="sw-word"/></div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">创建时间：</label>
                <div class="col-sm-8"><input type="text" class="form-control" id="sw-createDate" readonly/></div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">更新时间：</label>
                <div class="col-sm-8"><input type="text" class="form-control" id="sw-updateDate" readonly/></div>
            </div>
        </div>
    </form>
</div>

<th:block th:include="include :: footer" />
<th:block th:include="include :: bootstrap-table-fixed-columns-js" />
<script th:src="@{/web4x/js/im-table.js?v=20260622}"></script>
<script th:src="@{/web4x/js/im-risk-sensitive-word.js?v=20260622}"></script>
<script th:inline="javascript">
    $(function () {
        var canEdit = [[${@permission.isPermitted('risk:security:sensitive-word:edit')}]];
        var canDelete = [[${@permission.isPermitted('risk:security:sensitive-word:delete')}]];
        var canAdd = [[${@permission.isPermitted('risk:security:sensitive-word:add')}]];
        imRiskSensitiveWordInitTable(canEdit || canDelete || canAdd, canEdit, canDelete);
    });
</script>
</body>
</html>
