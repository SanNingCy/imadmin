<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('动态评论管理')" />
    <style>
        .comment-table-wrap { overflow-x: auto; }
        .comment-table-wrap td.comment-ellipsis,
        .comment-table-wrap th.comment-ellipsis {
            max-width: 180px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
    </style>
</head>
<body class="gray-bg">
<div class="container-div">
    <div class="row">
        <div class="col-sm-12 search-collapse">
            <form id="moment-comments-form">
                <div class="select-list">
                    <ul>
                        <li>用户IDNO：<input type="text" name="idno"/></li>
                        <li>靓号：<input type="text" name="lianghao"/></li>
                        <li>动态ID：<input type="text" name="dyId"/></li>
                        <li>
                            <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;查询</a>
                            <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                        </li>
                    </ul>
                </div>
            </form>
        </div>
        <div class="col-sm-12 select-table table-striped comment-table-wrap">
            <table id="bootstrap-table"></table>
        </div>
    </div>
</div>

<th:block th:include="include :: footer" />
<script th:src="@{/web4x/js/im-table.js?v=20260605c}"></script>
<script th:src="@{/web4x/js/im-content-moment-comments.js?v=20260605c}"></script>
<script th:inline="javascript">
    $(function () {
        imContentMomentCommentsInitTable([[${@permission.isPermitted('social:content:moment-comments:delete')}]]);
    });
</script>
</body>
</html>
