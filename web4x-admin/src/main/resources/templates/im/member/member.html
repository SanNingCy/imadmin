<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('移动端用户')" />
</head>
<body class="gray-bg">
<div class="container-div">
    <div class="row">
        <div class="col-sm-12 search-collapse">
            <form id="member-form">
                <div class="select-list">
                    <ul>
                        <li>昵称：<input type="text" name="nickname"/></li>
                        <li>手机号：<input type="text" name="phone"/></li>
                        <li>ID号：<input type="text" name="idno"/></li>
                        <li>
                            <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                            <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                        </li>
                    </ul>
                </div>
            </form>
        </div>
        <div class="btn-group-sm" id="toolbar" role="group">
            <a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="member:member:export">
                <i class="fa fa-download"></i> 导出
            </a>
        </div>
        <div class="col-sm-12 select-table table-striped">
            <table id="bootstrap-table"></table>
        </div>
    </div>
</div>
<th:block th:include="include :: footer" />
<script th:src="@{/web4x/js/im-table.js}"></script>
<script th:inline="javascript">
    var prefix = ctx + "member/member";
    $(function () {
        var options = {
            url: prefix + "/list",
            exportUrl: prefix + "/export",
            modalName: "移动端用户",
            responseHandler: imPageResponse,
            ajaxOptions: { beforeSend: imTableBeforeSend },
            columns: [
                {checkbox: true},
                {field: 'id', title: 'ID'},
                {field: 'idno', title: 'ID号'},
                {field: 'nickname', title: '昵称'},
                {field: 'phone', title: '手机号'},
                {field: 'state', title: '状态'},
                {field: 'createDate', title: '注册时间'}
            ]
        };
        $.table.init(options);
    });
</script>
</body>
</html>
