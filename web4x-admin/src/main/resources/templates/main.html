<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页</title>
    <link rel="shortcut icon" href="favicon.ico">
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet"/>
    <link th:href="@{/css/font-awesome.min.css}" rel="stylesheet"/>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: #f3f3f4;
            font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
            color: #333;
        }

        .im-dashboard {
            padding: 16px;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .im-dashboard .row-cards {
            display: flex;
            flex-wrap: wrap;
            margin: 0 -8px 16px;
        }

        .im-dashboard .stat-card {
            flex: 1 1 220px;
            min-width: 200px;
            margin: 0 8px 16px;
            border-radius: 12px;
            padding: 16px 18px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
        }

        .im-dashboard .stat-card .label {
            font-size: 14px;
            margin-bottom: 8px;
        }

        .im-dashboard .stat-card .value {
            font-size: 34px;
            font-weight: 600;
            line-height: 1.1;
            margin: 0 0 8px;
        }

        .im-dashboard .stat-card .sub {
            font-size: 12px;
            color: #888;
        }

        .card-blue {
            background: linear-gradient(135deg, #e6f2ff 0%, #f2f6ff 100%);
        }

        .card-blue .label { color: #4065b1; }

        .card-purple {
            background: linear-gradient(135deg, #f2e9ff 0%, #f9f2ff 100%);
        }

        .card-purple .label { color: #7b5fb0; }

        .card-yellow {
            background: linear-gradient(135deg, #fff7e6 0%, #fffaf2 100%);
        }

        .card-yellow .label { color: #b58b3f; }

        .card-pink {
            background: linear-gradient(135deg, #ffecee 0%, #fff6f7 100%);
        }

        .card-pink .label { color: #c45858; }

        .im-panel {
            background: #fff;
            border-radius: 4px;
            margin-bottom: 16px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
        }

        .im-panel .panel-title {
            padding: 14px 16px;
            font-size: 18px;
            font-weight: 500;
            border-bottom: 1px solid #f0f0f0;
        }

        .im-panel .panel-body {
            padding: 8px 16px 16px;
        }

        .chart-box {
            width: 100%;
        }

        #cityChart { height: 600px; }
        #eqChart { height: 360px; }

        .empty-tip {
            color: #999;
            padding: 24px 0;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="im-dashboard">
    <div class="row-cards">
        <div class="stat-card card-blue">
            <div class="label">会话总量</div>
            <div class="value" id="totalCount">-</div>
            <div class="sub">概览</div>
        </div>
        <div class="stat-card card-purple">
            <div class="label">在线设备数</div>
            <div class="value" id="onlineDeviceCount">-</div>
            <div class="sub">概览</div>
        </div>
        <div class="stat-card card-yellow">
            <div class="label">日活跃用户</div>
            <div class="value" id="dailyActiveUserCount">-</div>
            <div class="sub">概览</div>
        </div>
        <div class="stat-card card-pink">
            <div class="label">群聊数量</div>
            <div class="value" id="groupCount">-</div>
            <div class="sub">概览</div>
        </div>
    </div>

    <div class="im-panel">
        <div class="panel-title">用户地区分布图</div>
        <div class="panel-body">
            <div id="cityChart" class="chart-box"></div>
            <div id="cityEmpty" class="empty-tip" style="display:none;">暂无数据</div>
        </div>
    </div>

    <div class="im-panel">
        <div class="panel-title">设备使用情况</div>
        <div class="panel-body">
            <div id="eqChart" class="chart-box"></div>
            <div id="eqEmpty" class="empty-tip" style="display:none;">暂无数据</div>
        </div>
    </div>
</div>

<script th:inline="javascript">var ctx = [[@{/}]];</script>
<script th:src="@{/js/jquery.min.js}"></script>
<script th:src="@{/ajax/libs/report/echarts/echarts-all.min.js}"></script>
<script>
(function () {
    var cityChart = null;
    var eqChart = null;
    var TOKEN_KEY = 'token';
    // 明亮色板，避免 Treemap 默认配色出现过暗色块
    var TREEMAP_COLORS = [
        '#5B8FF9', '#61DDAA', '#F6BD16', '#7262FD', '#78D3F8',
        '#9661BC', '#F6903D', '#36CFC9', '#F08BB4', '#6FCEF6',
        '#98D87E', '#FFB94A', '#B794F6', '#4ECDC4', '#FF8A9B',
        '#87CEEB', '#90EE90', '#FFD666', '#D3ADF7', '#87E8DE'
    ];

    function getToken() {
        var match = document.cookie.match(new RegExp('(?:^|;\\s*)' + TOKEN_KEY + '=([^;]*)'));
        return match ? decodeURIComponent(match[1]) : '';
    }

    function extractList(res) {
        if (!res) {
            return [];
        }
        if (Array.isArray(res.dataList)) {
            return res.dataList;
        }
        if (res.data && Array.isArray(res.data.dataList)) {
            return res.data.dataList;
        }
        return [];
    }

    function requestDashboard(url, callback) {
        var token = getToken();
        var headers = {};
        if (token) {
            headers[TOKEN_KEY] = token;
        }
        $.ajax({
            url: ctx + url,
            type: 'POST',
            contentType: 'application/json;charset=UTF-8',
            data: JSON.stringify({}),
            headers: headers,
            xhrFields: { withCredentials: true },
            success: function (res) {
                if (res && (res.success === true || res.success === undefined || res.code === 200)) {
                    callback(res);
                    return;
                }
                console.error('接口失败: ' + url, res);
            },
            error: function (xhr) {
                console.error('请求失败: ' + url, xhr.status, xhr.responseText);
            }
        });
    }

    function loadTopData() {
        requestDashboard('chatlog/chatLog/topData', function (res) {
            var data = res.data || {};
            $('#totalCount').text(data.totalCount != null ? data.totalCount : 0);
            $('#onlineDeviceCount').text(data.onlineDeviceCount != null ? data.onlineDeviceCount : 0);
            $('#dailyActiveUserCount').text(data.dailyActiveUserCount != null ? data.dailyActiveUserCount : 0);
            $('#groupCount').text(data.groupCount != null ? data.groupCount : 0);
        });
    }

    function renderCityChart(list) {
        if (!list || list.length === 0) {
            $('#cityChart').hide();
            $('#cityEmpty').show();
            return;
        }
        $('#cityChart').show();
        $('#cityEmpty').hide();
        if (!cityChart) {
            cityChart = echarts.init(document.getElementById('cityChart'));
        }
        var sorted = list.slice().sort(function (a, b) {
            return Number(b.count || 0) - Number(a.count || 0);
        });
        cityChart.setOption({
            color: TREEMAP_COLORS,
            tooltip: { trigger: 'item', formatter: '{b}: {c}' },
            series: [{
                type: 'treemap',
                roam: true,
                breadcrumb: { show: false },
                label: {
                    show: true,
                    color: '#333',
                    fontSize: 12,
                    formatter: function (p) {
                        var name = String(p.name || '');
                        var short = name.length > 8 ? name.slice(0, 8) + '…' : name;
                        return short + '\n' + p.value;
                    }
                },
                levels: [{
                    itemStyle: {
                        gapWidth: 2,
                        borderColor: '#fff',
                        borderWidth: 1
                    },
                    upperLabel: { show: false }
                }],
                data: sorted.map(function (it, i) {
                    return {
                        name: it.city,
                        value: Number(it.count || 0),
                        itemStyle: { color: TREEMAP_COLORS[i % TREEMAP_COLORS.length] }
                    };
                })
            }]
        }, true);
    }

    function renderEqChart(list) {
        if (!list || list.length === 0) {
            $('#eqChart').hide();
            $('#eqEmpty').show();
            return;
        }
        $('#eqChart').show();
        $('#eqEmpty').hide();
        if (!eqChart) {
            eqChart = echarts.init(document.getElementById('eqChart'));
        }
        var models = list.map(function (it) { return it.model; });
        var counts = list.map(function (it) { return Number(it.count || 0); });
        // 设备型号很多时只稀疏显示 X 轴文字，与 IM 原后台一致
        var labelStep = Math.max(1, Math.ceil(models.length / 12));
        eqChart.setOption({
            tooltip: {
                trigger: 'axis',
                axisPointer: { type: 'shadow' },
                formatter: function (params) {
                    var p = params && params[0];
                    if (!p) {
                        return '';
                    }
                    return p.name + '<br/>数量: ' + p.value;
                }
            },
            grid: { left: 48, right: 20, top: 30, bottom: 40 },
            xAxis: {
                type: 'category',
                data: models,
                axisLabel: {
                    interval: function (index) {
                        return index % labelStep === 0;
                    },
                    rotate: 0,
                    fontSize: 11,
                    color: '#666'
                },
                axisTick: { alignWithLabel: true }
            },
            yAxis: { type: 'value' },
            series: [{
                name: '数量',
                type: 'bar',
                data: counts,
                itemStyle: { color: '#faca63' },
                barMaxWidth: 36
            }]
        }, true);
    }

    function loadCityData() {
        requestDashboard('chatlog/chatLog/memberMap', function (res) {
            var list = extractList(res);
            if (list.length === 0) {
                requestDashboard('api/memberMap', function (fallback) {
                    renderCityChart(extractList(fallback));
                });
                return;
            }
            renderCityChart(list);
        });
    }

    function loadEqData() {
        requestDashboard('chatlog/chatLog/eqMap', function (res) {
            var list = extractList(res);
            if (list.length === 0) {
                requestDashboard('api/eqMap', function (fallback) {
                    renderEqChart(extractList(fallback));
                });
                return;
            }
            renderEqChart(list);
        });
    }

    function resizeCharts() {
        if (cityChart) cityChart.resize();
        if (eqChart) eqChart.resize();
    }

    $(function () {
        loadTopData();
        loadCityData();
        loadEqData();
        $(window).on('resize', resizeCharts);
    });
})();
</script>
</body>
</html>
