<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>登录SeekWeb4系统</title>
    <meta name="description" content="web4x后台管理框架">
    <link href="../static/css/bootstrap.min.css" th:href="@{/css/bootstrap.min.css}" rel="stylesheet"/>
    <link href="../static/css/font-awesome.min.css" th:href="@{/css/font-awesome.min.css}" rel="stylesheet"/>
    <link href="../static/css/login.css" th:href="@{/css/login.css?v=20260612}" rel="stylesheet"/>
    <link href="../static/web4x/css/ry-ui.css" th:href="@{/web4x/css/ry-ui.css?v=4.8.3}" rel="stylesheet"/>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="shortcut icon" href="../static/favicon.ico" th:href="@{favicon.ico}"/>
    <style type="text/css">label.error { position: inherit; color: #e74c3c; font-size: 12px; margin-top: 4px; }</style>
    <script>
        if(window.top!==window.self){alert('未登录或登录超时。请重新登录');window.top.location=window.location};
    </script>
</head>
<body class="signin">
<div class="login-page">
    <div class="login-card">
        <div class="login-card-header">
            <h1 class="login-card-title">SeekWeb4管理系统</h1>
        </div>
        <div class="login-card-body">
            <form id="signupForm" autocomplete="off">
                <div class="login-field">
                    <label class="login-label" for="login-username">账号</label>
                    <input type="text" id="login-username" name="username" class="form-control login-input" placeholder="请输入账号" value=""/>
                </div>
                <div class="login-field">
                    <label class="login-label" for="login-password">密码</label>
                    <input type="password" id="login-password" name="password" class="form-control login-input" placeholder="请输入密码" value=""/>
                </div>
                <div class="login-field" th:if="${captchaEnabled==true}">
                    <label class="login-label" for="login-captcha">验证码</label>
                    <div class="login-captcha-row">
                        <input type="text" id="login-captcha" name="validateCode" class="form-control login-input code" placeholder="请输入验证码" maxlength="5"/>
                        <a class="login-captcha-img" href="javascript:void(0);" title="点击更换验证码">
                            <img th:src="@{/captcha/captchaImage(type=${captchaType})}" class="imgcode" alt="验证码"/>
                        </a>
                    </div>
                </div>
                <div class="login-remember" th:if="${isRemembered}">
                    <div class="checkbox-custom">
                        <input type="checkbox" id="rememberme" name="rememberme">
                        <label for="rememberme">记住我</label>
                    </div>
                </div>
                <button type="submit" class="btn btn-login" id="btnSubmit" data-loading="正在验证登录，请稍候...">登录</button>
            </form>
            <p class="login-register" th:if="${isAllowRegister}">
                还没有账号？ <a th:href="@{/register}">立即注册</a>
            </p>
        </div>
    </div>
    <div class="login-footer">
        Copyright © 2018-2026 web4x.vip All Rights Reserved.
    </div>
</div>
<script th:inline="javascript"> var ctx = [[@{/}]]; var captchaType = [[${captchaType}]]; var captchaEnabled = [[${captchaEnabled}]];</script>
<!--[if lte IE 8]><script>window.location.href=ctx+'html/ie.html';</script><![endif]-->
<script src="../static/js/jquery.min.js" th:src="@{/js/jquery.min.js}"></script>
<script src="../static/ajax/libs/validate/jquery.validate.min.js" th:src="@{/ajax/libs/validate/jquery.validate.min.js}"></script>
<script src="../static/ajax/libs/layer/layer.min.js" th:src="@{/ajax/libs/layer/layer.min.js}"></script>
<script src="../static/ajax/libs/blockUI/jquery.blockUI.js" th:src="@{/ajax/libs/blockUI/jquery.blockUI.js}"></script>
<script src="../static/web4x/js/ry-ui.js" th:src="@{/web4x/js/ry-ui.js?v=4.8.3}"></script>
<script src="../static/web4x/login.js" th:src="@{/web4x/login.js}"></script>
</body>
</html>
