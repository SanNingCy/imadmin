<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<th:block th:include="include :: header('字典类型列表')" />
	<style>.drawer-mask{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.18);z-index:1040}.drawer-panel{position:fixed;top:0;right:0;width:800px;max-width:95vw;height:100%;background:#fff;z-index:1050;box-shadow:-4px 0 24px rgba(0,0,0,0.13);transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}.drawer-panel.open{transform:translateX(0)}.drawer-head{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid #e8ecf0;background:#f7f9fb;flex-shrink:0}.drawer-head-left{display:flex;align-items:center;gap:10px}.drawer-title{font-size:14px;font-weight:600;color:#2c3e50}.drawer-subtitle{font-size:12px;color:#95a5a6;font-family:monospace}.drawer-close{background:0;border:0;font-size:18px;color:#aaa;cursor:pointer;line-height:1;padding:2px 6px;border-radius:4px}.drawer-close:hover{background:#f0f2f5;color:#555}.drawer-body{flex:1;overflow-y:auto;padding:16px 20px}.drawer-loading{display:flex;align-items:center;justify-content:center;height:120px;color:#aaa;font-size:13px;gap:8px}.drawer-empty{text-align:center;color:#bbb;padding:40px 0;font-size:13px}.dict-card-wrap{border:1px solid #e8ecf0;border-radius:6px;overflow:hidden;margin-bottom:8px}.dict-card{display:grid;grid-template-columns:1fr 1fr 1fr}.dict-card-row{display:grid;grid-template-columns:82px 1fr;border-bottom:1px solid #f0f4f8;border-right:1px solid #f0f4f8}.dict-card-row:nth-child(3n){border-right:0}.dict-card-row:nth-last-child(-n+3){border-bottom:0}.dict-card-key{padding:9px 14px;font-size:12px;color:#888;background:#f7f9fb;border-right:1px solid #f0f4f8}.dict-card-val{padding:9px 14px;font-size:13px;color:#2c3e50;word-break:break-all}.drawer-stats{display:flex;gap:12px;margin-bottom:14px}.drawer-stat{flex:1;background:#f7f9fb;border:1px solid #e8ecf0;border-radius:6px;padding:10px 14px;text-align:center}.drawer-stat-num{font-size:20px;font-weight:700;color:#2c3e50}.drawer-stat-label{font-size:11px;color:#95a5a6;margin-top:2px}</style>
</head>
<body class="gray-bg">
	<div class="container-div">
		<div class="row">
			<div class="col-sm-12 search-collapse">
				<form id="type-form">
					<div class="select-list">
						<ul>
							<li>
								字典类型：<input type="text" name="type"/>
							</li>
							<li>
								字典描述：<input type="text" name="description"/>
							</li>
							<li>
								<a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
							    <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
							</li>
						</ul>
					</div>
				</form>
			</div>
			
	       <div class="btn-group-sm" id="toolbar" role="group">
	            <a class="btn btn-success" onclick="$.operate.add()" shiro:hasPermission="system:dict:add">
	                <i class="fa fa-plus"></i> 新增
	            </a>
	            <a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="system:dict:edit">
		            <i class="fa fa-edit"></i> 修改
		        </a>
				<a class="btn btn-danger multiple disabled" onclick="imDictTypeRemoveSelected()" shiro:hasPermission="system:dict:remove">
		            <i class="fa fa-remove"></i> 删除
		        </a>
	        </div>
	        
	        <div class="col-sm-12 select-table table-striped">
			    <table id="bootstrap-table"></table>
			</div>
		</div>
	</div>
	
	<div class="drawer-mask" id="drawerMask" onclick="closeDrawer()"></div>
	<div class="drawer-panel" id="drawerPanel">
		<div class="drawer-head">
			<div class="drawer-head-left">
				<i class="fa fa-list-ul" style="color:#5b9bd5;"></i>
				<span class="drawer-title" id="drawerTitle">字典数据</span>
				<span class="drawer-subtitle" id="drawerSubtitle"></span>
			</div>
			<button class="drawer-close" onclick="closeDrawer()" title="关闭">&#10005;</button>
		</div>
		<div class="drawer-body" id="drawerBody">
			<div class="drawer-loading"><i class="fa fa-spinner fa-spin"></i> 加载中...</div>
		</div>
	</div>
	
	<th:block th:include="include :: footer" />
	<script th:src="@{/web4x/js/im-table.js}"></script>
	<script th:src="@{/web4x/js/im-dict.js}"></script>
	<script th:inline="javascript">
		var editFlag = [[${@permission.hasPermi('system:dict:edit')}]];
		var listFlag = [[${@permission.hasPermi('system:dict:list')}]];
		var removeFlag = [[${@permission.hasPermi('system:dict:remove')}]];
		var pagePrefix = ctx + "sys/dict/type";

		$(function() {
		    imInitTable({
		        url: imDictApi + "/type/list",
		        formId: "type-form",
		        queryParams: function(params) {
		            return imDictQueryParams("type-form", params);
		        },
		        createUrl: pagePrefix + "/add",
		        updateUrl: pagePrefix + "/edit/{id}",
		        uniqueId: "id",
		        sortName: "updateDate",
		        sortOrder: "desc",
		        modalName: "字典类型",
		        columns: [{
		            checkbox: true
		        },
		        {
		            field: 'id',
		            title: '字典主键',
		            visible: false
		        },
		        {
		            field: 'description',
		            title: '字典描述',
		            sortable: true
		        },
		        {
		            field: 'type',
		            title: '字典类型',
		            sortable: true,
		            formatter: function(value, row) {
		                return '<a href="javascript:void(0)" onclick="view(\'' + row.id + '\')">' + imEscapeHtml(value || "") + '</a>';
		            }
		        },
		        {
		            field: 'createDate',
		            title: '创建时间',
		            sortable: true,
		            formatter: function(value) {
		                return imDictFormatDate(value);
		            }
		        },
		        {
		            field: 'updateDate',
		            title: '更新时间',
		            sortable: true,
		            formatter: function(value) {
		                return imDictFormatDate(value);
		            }
		        },
		        {
		            title: '操作',
		            align: 'center',
		            formatter: function(value, row) {
		                var actions = [];
		                actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.id + '\')"><i class="fa fa-edit"></i>编辑</a> ');
		                actions.push('<a class="btn btn-info btn-xs ' + listFlag + '" href="javascript:void(0)" onclick="detail(\'' + row.id + '\')"><i class="fa fa-list-ul"></i>列表</a> ');
		                actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="imDictTypeRemove(\'' + row.id + '\')"><i class="fa fa-remove"></i>删除</a>');
		                return actions.join('');
		            }
		        }]
		    });
		});

		function detail(dictTypeId) {
		    var url = ctx + "sys/dict/data?dictTypeId=" + encodeURIComponent(dictTypeId);
		    $.modal.openTab("字典数据", url);
		}

		function imDictTypeRemove(id) {
		    imDictConfirmRemove("确认删除该字典类型吗？", function() {
		        imDictRemoveTypes(id, function(ok, res) {
		            if (ok) {
		                $.modal.msgSuccess((res && res.msg) ? res.msg : "删除成功");
		                $("#bootstrap-table").bootstrapTable("refresh");
		            } else {
		                $.modal.alertWarning((res && res.msg) ? res.msg : "删除失败");
		            }
		        });
		    });
		}

		function imDictTypeRemoveSelected() {
		    var rows = $("#bootstrap-table").bootstrapTable("getSelections");
		    if (!rows || rows.length === 0) {
		        $.modal.alertWarning("请至少选择一条记录");
		        return;
		    }
		    var ids = $.map(rows, function(row) { return row.id; }).join(",");
		    imDictConfirmRemove("确认删除选中的字典类型吗？", function() {
		        imDictRemoveTypes(ids, function(ok, res) {
		            if (ok) {
		                $.modal.msgSuccess((res && res.msg) ? res.msg : "删除成功");
		                $("#bootstrap-table").bootstrapTable("refresh");
		            } else {
		                $.modal.alertWarning((res && res.msg) ? res.msg : "删除失败");
		            }
		        });
		    });
		}

		function view(dictTypeId) {
			var row = null;
			var $rows = $("#bootstrap-table").bootstrapTable('getData');
			for (var i = 0; i < $rows.length; i++) {
				if (String($rows[i].id) === String(dictTypeId)) { row = $rows[i]; break; }
			}
			var typeName = row ? (row.description || row.type) : '字典数据';
			var typeKey  = row ? row.type : '';

			$("#drawerTitle").text(typeName);
			$("#drawerSubtitle").text(typeKey);
			$("#drawerBody").html('<div class="drawer-loading"><i class="fa fa-spinner fa-spin"></i> 加载中...</div>');

			$("#drawerMask").show();
			$("#drawerPanel").addClass("open");
			$("body").css("overflow", "hidden");

			imDictLoadValues(dictTypeId, function(rows) {
				renderDrawer(rows);
			});
		}

		function renderDrawer(rows) {
			if (!rows || rows.length === 0) {
				$("#drawerBody").html('<div class="drawer-empty"><i class="fa fa-inbox fa-2x"></i><br><br>暂无字典数据</div>');
				return;
			}

			var html = '';
			html += '<div class="drawer-stats">';
			html += '  <div class="drawer-stat"><div class="drawer-stat-num">' + rows.length + '</div><div class="drawer-stat-label">共计条目</div></div>';
			html += '</div>';

			for (var i = 0; i < rows.length; i++) {
				var r = rows[i];
				html += '<div class="dict-card-wrap"><div class="dict-card">';
				html += '  <div class="dict-card-row"><div class="dict-card-key">标签</div><div class="dict-card-val">' + imEscapeHtml(r.label || "") + '</div></div>';
				html += '  <div class="dict-card-row"><div class="dict-card-key">键值</div><div class="dict-card-val"><code>' + imEscapeHtml(r.value || "") + '</code></div></div>';
				html += '  <div class="dict-card-row"><div class="dict-card-key">排序</div><div class="dict-card-val">' + imEscapeHtml(r.sort != null ? String(r.sort) : "-") + '</div></div>';
				html += '</div></div>';
			}
			$("#drawerBody").html(html);
		}

		function closeDrawer() {
			$("#drawerPanel").removeClass("open");
			$("#drawerMask").hide();
			$("body").css("overflow", "");
		}

		$(document).on("keydown", function(e) {
			if (e.key === "Escape") closeDrawer();
		});
	</script>
</body>
</html>
