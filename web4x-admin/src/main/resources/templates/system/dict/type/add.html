<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
	<th:block th:include="include :: header('新增字典类型')" />
</head>
<body class="white-bg">
	<div class="wrapper wrapper-content animated fadeInRight ibox-content">
		<form class="form-horizontal m" id="form-dict-add">
			<div class="form-group">
				<label class="col-sm-3 control-label is-required">字典描述：</label>
				<div class="col-sm-8">
					<input class="form-control" type="text" name="description" id="description" required>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label is-required">字典类型：</label>
				<div class="col-sm-8">
					<input class="form-control" type="text" name="type" id="type" required>
					<span class="help-block m-b-none"><i class="fa fa-info-circle"></i> 数据存储中的 Key 值，如：sys_user_sex</span>
				</div>
			</div>
		</form>
	</div>
	<th:block th:include="include :: footer" />
	<script th:src="@{/web4x/js/im-table.js}"></script>
	<script th:src="@{/web4x/js/im-dict.js}"></script>
	<script type="text/javascript">
		$("#form-dict-add").validate({
			onkeyup: false,
			rules:{
				type:{
					minlength: 2
				}
			},
		    focusCleanup: true
		});
		
		function submitHandler() {
	        if ($.validate.form()) {
	        	imDictSaveType({
	        		type: $.common.trim($("#type").val()),
	        		description: $.common.trim($("#description").val())
	        	}, function(ok, res) {
	        		if (ok) {
	        			imDictSuccessCallback(res);
	        		} else {
	        			$.modal.alertWarning((res && res.msg) ? res.msg : "保存失败");
	        		}
	        	});
	        }
	    }
	</script>
</body>
</html>
