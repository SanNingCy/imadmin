<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
	<th:block th:include="include :: header('修改字典类型')" />
</head>
<body class="white-bg">
	<div class="wrapper wrapper-content animated fadeInRight ibox-content">
		<form class="form-horizontal m" id="form-dict-edit">
			<input id="id" name="id" type="hidden" />
			<div class="form-group">
				<label class="col-sm-3 control-label is-required">字典描述：</label>
				<div class="col-sm-8">
					<input class="form-control" type="text" name="description" id="description" required>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label is-required">字典类型：</label>
				<div class="col-sm-8">
					<input class="form-control" type="text" name="type" id="type" required>
					<span class="help-block m-b-none"><i class="fa fa-info-circle"></i> 数据存储中的 Key 值，如：sys_user_sex</span>
				</div>
			</div>
		</form>
	</div>
	<th:block th:include="include :: footer" />
	<script th:src="@{/web4x/js/im-table.js}"></script>
	<script th:src="@{/web4x/js/im-dict.js}"></script>
	<script type="text/javascript">
		var dictId = (function() {
			var parts = window.location.pathname.split("/");
			return parts[parts.length - 1] || "";
		})();

		$("#form-dict-edit").validate({
			onkeyup: false,
			rules:{
				type:{
					minlength: 2
				}
			},
		    focusCleanup: true
		});

		$(function() {
			if (!dictId) {
				return;
			}
			imDictFindTypeById(dictId, function(info) {
				if (!info) {
					$.modal.alertWarning("获取字典类型失败");
					return;
				}
				$("#id").val(info.id || "");
				$("#description").val(info.description || "");
				$("#type").val(info.type || "");
			});
		});
		
		function submitHandler() {
	        if ($.validate.form()) {
	        	imDictSaveType({
	        		id: $("#id").val(),
	        		type: $.common.trim($("#type").val()),
	        		description: $.common.trim($("#description").val())
	        	}, function(ok, res) {
	        		if (ok) {
	        			imDictSuccessCallback(res);
	        		} else {
	        			$.modal.alertWarning((res && res.msg) ? res.msg : "保存失败");
	        		}
	        	});
	        }
	    }
	</script>
</body>
</html>
