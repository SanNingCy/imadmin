<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
	<th:block th:include="include :: header('字典树选择')" />
	<th:block th:include="include :: ztree-css" />
</head>
<style>
	body{height:auto;font-family: "Microsoft YaHei";}
	button{font-family: "SimSun","Helvetica Neue",Helvetica,Arial;}
</style>
<body class="hold-transition box box-main">
	<input id="columnId" type="hidden" th:value="${columnId}"/>
	<input id="treeId"   type="hidden"/>
	<input id="dictType" type="hidden" th:value="${dict?.dictType}"/>
	<div class="wrapper"><div class="treeShowHideButton" onclick="$.tree.toggleSearch();">
		<label id="btnShow" title="显示搜索" style="display:none;">︾</label>
		<label id="btnHide" title="隐藏搜索">︽</label>
	</div>
	<div class="treeSearchInput" id="search">
		<label for="keyword">关键字：</label><input type="text" class="empty" id="keyword" maxlength="50">
		<button class="btn" id="btn" onclick="$.tree.searchNode()"> 搜索 </button>
	</div>
	<div id="tree" class="ztree treeselect"></div>
	</div>
	<th:block th:include="include :: footer" />
	<th:block th:include="include :: ztree-js" />
	<script th:src="@{/web4x/js/im-table.js}"></script>
	<script th:src="@{/web4x/js/im-dict.js}"></script>
	<script th:inline="javascript">
		$(function() {
			imDictAjax({
				url: imDictApi + "/listData",
				type: "GET",
				dataType: "json",
				success: function(res) {
					if (!imDictIsSuccess(res)) {
						return;
					}
					var nodes = $.map(res.list || [], function(item) {
						return {
							id: item.id,
							pId: 0,
							name: item.type,
							title: item.type
						};
					});
					var options = {
						data: { simpleData: { enable: true } },
						callback: { onClick: zOnClick }
					};
					$.fn.zTree.init($("#tree"), options, nodes);
				}
			});
		});
		
		function zOnClick(event, treeId, treeNode) {
		    $("#treeId").val(treeNode.id);
		    $("#dictType").val(treeNode.title);
		}
	</script>
</body>
</html>
