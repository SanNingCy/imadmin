<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<th:block th:include="include :: header('字典数据列表')" />
</head>
<body class="gray-bg">
	<div class="container-div">
		<div class="row">
			<div class="col-sm-12 search-collapse">
				<form id="data-form">
					<div class="select-list">
						<ul>
							<li>
								字典标签：<input type="text" name="label"/>
							</li>
							<li>
								<a class="btn btn-primary btn-rounded btn-sm" onclick="imDictDataSearch()"><i class="fa fa-search"></i>&nbsp;搜索</a>
							    <a class="btn btn-warning btn-rounded btn-sm" onclick="imDictDataReset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
							</li>
						</ul>
					</div>
				</form>
			</div>
			
	       <div class="btn-group-sm" id="toolbar" role="group">
	            <a class="btn btn-success" onclick="imDictDataAdd()" shiro:hasPermission="system:dict:add">
	                <i class="fa fa-plus"></i> 新增
	            </a>
	            <a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="system:dict:edit">
		            <i class="fa fa-edit"></i> 修改
		        </a>
				<a class="btn btn-danger multiple disabled" onclick="imDictDataRemoveSelected()" shiro:hasPermission="system:dict:remove">
		            <i class="fa fa-remove"></i> 删除
		        </a>
		        <a class="btn btn-danger" onclick="closeItem()">
		            <i class="fa fa-reply-all"></i> 关闭
		        </a>
	        </div>
	        
	        <div class="col-sm-12 select-table table-striped">
			    <table id="bootstrap-table"></table>
			</div>
		</div>
	</div>
	<th:block th:include="include :: footer" />
	<script th:src="@{/web4x/js/im-table.js}"></script>
	<script th:src="@{/web4x/js/im-dict.js}"></script>
	<script th:inline="javascript">
		var editFlag = [[${@permission.hasPermi('system:dict:edit')}]];
		var removeFlag = [[${@permission.hasPermi('system:dict:remove')}]];
		var pagePrefix = ctx + "sys/dict/data";
		var imDictDataCache = [];
		var imDictDataTypeId = imDictGetUrlParam("dictTypeId");

		function imDictDataFilterRows(rows) {
			var label = $.common.trim($("input[name='label']").val());
			if (!label) {
				return rows;
			}
			return $.grep(rows, function(row) {
				return String(row.label || "").indexOf(label) > -1;
			});
		}

		function imDictDataShouldApplyLabelFilter() {
			return !!$.common.trim($("input[name='label']").val());
		}

		function imDictDataLoadTable(rows, applyLabelFilter) {
			imDictDataCache = rows || [];
			var displayRows = applyLabelFilter ? imDictDataFilterRows(imDictDataCache) : imDictDataCache;
			$("#bootstrap-table").bootstrapTable("load", {
				total: displayRows.length,
				rows: displayRows
			});
		}

		function imDictDataRefreshTable(applyLabelFilter) {
			if (!imDictDataTypeId) {
				imDictDataLoadTable([], false);
				return;
			}
			imDictLoadValues(imDictDataTypeId, function(rows) {
				imDictDataLoadTable(rows, !!applyLabelFilter);
			});
		}

		$(function() {
			imInitTable({
				formId: "data-form",
				sidePagination: "client",
				onLoadSuccess: function(data) {
					imDictDataCache = data || [];
				},
				pagination: true,
				pageSize: 10,
				pageList: [10, 25, 50, 100],
				sortName: "sort",
				sortOrder: "asc",
				uniqueId: "id",
				firstLoad: false,
				createUrl: pagePrefix + "/add/{id}",
				updateUrl: pagePrefix + "/edit/{id}",
				modalName: "字典数据",
				columns: [{
						checkbox: true
					},
					{
						field: 'id',
						title: '字典编码',
						visible: false
					},
					{
						field: 'label',
						title: '字典标签'
					},
					{
						field: 'dictValue',
						title: '字典键值',
						formatter: function(value, row) {
							return row.value != null ? row.value : "";
						}
					},
					{
						field: 'sort',
						title: '字典排序'
					},
					{
						title: '操作',
						align: 'center',
						formatter: function(value, row) {
							var actions = [];
							actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.id + '\')"><i class="fa fa-edit"></i>编辑</a> ');
							actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="imDictDataRemove(\'' + row.id + '\')"><i class="fa fa-remove"></i>删除</a>');
							return actions.join('');
						}
					}]
			});

			$("#bootstrap-table").on("refresh.bs.table", function () {
				imDictDataRefreshTable(imDictDataShouldApplyLabelFilter());
			});

			if (!imDictDataTypeId) {
				$.modal.alertWarning("缺少字典类型参数，请从字典类型列表进入");
				return;
			}
			imDictDataRefreshTable();
		});

		function imDictDataSearch() {
			if (!imDictDataTypeId) {
				$.modal.alertWarning("缺少字典类型参数，请从字典类型列表进入");
				return;
			}
			imDictDataRefreshTable(true);
		}

		function imDictDataReset() {
			$.form.reset("data-form", "bootstrap-table");
		}

		function imDictDataAdd() {
		    if (!imDictDataTypeId) {
		        $.modal.alertWarning("缺少字典类型参数，请从字典类型列表进入");
		        return;
		    }
		    $.operate.add(imDictDataTypeId);
		}

		function imDictDataRemove(id) {
		    imDictConfirmRemove("确认删除该字典数据吗？", function() {
		        imDictRemoveValues(id, function(ok, res) {
		            if (ok) {
		                $.modal.msgSuccess((res && res.msg) ? res.msg : "删除成功");
		                imDictDataRefreshTable();
		            } else {
		                $.modal.alertWarning((res && res.msg) ? res.msg : "删除失败");
		            }
		        });
		    });
		}

		function imDictDataRemoveSelected() {
		    var rows = $("#bootstrap-table").bootstrapTable("getSelections");
		    if (!rows || rows.length === 0) {
		        $.modal.alertWarning("请至少选择一条记录");
		        return;
		    }
		    var ids = $.map(rows, function(row) { return row.id; }).join(",");
		    imDictConfirmRemove("确认删除选中的字典数据吗？", function() {
		        imDictRemoveValues(ids, function(ok, res) {
		            if (ok) {
		                $.modal.msgSuccess((res && res.msg) ? res.msg : "删除成功");
		                imDictDataRefreshTable();
		            } else {
		                $.modal.alertWarning((res && res.msg) ? res.msg : "删除失败");
		            }
		        });
		    });
		}
	</script>
</body>
</html>
