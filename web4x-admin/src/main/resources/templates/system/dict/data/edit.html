<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
	<th:block th:include="include :: header('修改字典数据')" />
</head>
<body class="white-bg">
	<div class="wrapper wrapper-content animated fadeInRight ibox-content">
		<form class="form-horizontal m" id="form-dict-edit">
			<input name="id" id="id" type="hidden" />
			<input type="hidden" id="dictTypeId" name="dictTypeId" />
			<div class="form-group">
				<label class="col-sm-3 control-label is-required">字典标签：</label>
				<div class="col-sm-8">
					<input class="form-control" type="text" name="label" id="label" required>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label is-required">字典键值：</label>
				<div class="col-sm-8">
					<input class="form-control" type="text" name="value" id="value" required>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label">字典类型：</label>
				<div class="col-sm-8">
					<input class="form-control" type="text" id="dictTypeName" readonly="true">
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label is-required">字典排序：</label>
				<div class="col-sm-8">
					<input class="form-control" type="text" name="sort" id="sort" required>
				</div>
			</div>
		</form>
	</div>
	<th:block th:include="include :: footer" />
	<script th:src="@{/web4x/js/im-table.js}"></script>
	<script th:src="@{/web4x/js/im-dict.js}"></script>
	<script type="text/javascript">
		var dictValueId = (function() {
			var parts = window.location.pathname.split("/");
			return parts[parts.length - 1] || "";
		})();

		$("#form-dict-edit").validate({
			rules:{
				sort:{
					digits:true
				}
			},
			focusCleanup: true
		});

		$(function() {
			if (!dictValueId) {
				return;
			}
			imDictFindValueById(dictValueId, function(info) {
				if (!info) {
					$.modal.alertWarning("获取字典数据失败");
					return;
				}
				$("#id").val(info.id || "");
				$("#label").val(info.label || "");
				$("#value").val(info.value || "");
				$("#sort").val(info.sort != null ? info.sort : "");
				var typeId = info.dictType && info.dictType.id ? info.dictType.id : "";
				$("#dictTypeId").val(typeId);
				if (typeId) {
					imDictFindTypeById(typeId, function(typeInfo) {
						if (typeInfo) {
							$("#dictTypeName").val((typeInfo.description || "") + (typeInfo.type ? " (" + typeInfo.type + ")" : ""));
						}
					});
				}
			});
		});
		
		function submitHandler() {
	        if ($.validate.form()) {
	        	imDictSaveValue({
	        		id: $("#id").val(),
	        		label: $.common.trim($("#label").val()),
	        		value: $.common.trim($("#value").val()),
	        		sort: $.common.trim($("#sort").val()),
	        		dictTypeId: $("#dictTypeId").val()
	        	}, function(ok, res) {
	        		if (ok) {
	        			imDictSuccessCallback(res);
	        		} else {
	        			$.modal.alertWarning((res && res.msg) ? res.msg : "保存失败");
	        		}
	        	});
	        }
	    }
	</script>
</body>
</html>
