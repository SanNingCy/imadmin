spring:
  profiles:
    active: dev
#    active: env82
# thymeleaf静态资源配置
# 默认路径
spring.thymeleaf.prefix: classpath:/templates/
# 后缀
spring.thymeleaf.suffix: .html
# 模板格式
spring.thymeleaf.mode: HTML5
spring.thymeleaf.encoding: UTF-8
# 项目访问路径
#filePath: http://119.45.9.228:84/
#httpsPath: http://119.45.9.228:84/
num: caizongim

chatRoom:
  domain: https://a41.chat.agora.io

kickOut:
  domain: https://api.agora.io

token:
  expirationInSeconds: 86400
  privilegeExpirationInSeconds: 86400

# Agora Webhook Configuration
agora:
  webhook:
    # 客户密钥，用于webhook签名验证（需要替换为实际的密钥）
    customer-key: "0040aa35a98749ecb5b207948d5351f2"

    # 签名验证配置
    signature-verification:
      # 是否启用签名验证，生产环境建议启用
      enabled: true
      # 优先使用的签名算法: sha1, sha256, auto
      preferred-algorithm: "auto"
      # 严格模式：要求所有签名都验证通过
      strict-mode: false

    # 事件处理配置
    event-handling:
      # 是否启用异步处理
      async-processing: true
      # 线程池核心大小
      core-pool-size: 2
      # 线程池最大大小
      max-pool-size: 10
      # 队列容量
      queue-capacity: 100
      # 线程名称前缀
      thread-name-prefix: "webhook-event-"
      # 事件处理超时时间（秒）
      timeout-seconds: 30
      # 失败重试次数
      max-retries: 3
      # 重试间隔（毫秒）
      retry-interval: 1000

    # 缓存清理间隔（毫秒）- 1小时
    cache-cleanup-interval: 3600000
    # 通知ID缓存时间（毫秒）- 24小时
    notice-id-cache-time: 86400000
# TODO Shiro权限检查开关（开发阶段可设置为false禁用所有@RequiresPermissions注解）
shiro:
  permission-check-enabled: false

