server:
  port: 8053
  servlet:
    context-path:
    tomcat:
      uri-encoding: UTF-8
      basedir: ./logs/tomcat
      max-threads: 2000
      min-spare-threads: 10
      accesslog:
        pattern: common
        enabled: true
        directory: logs
        prefix: access_log
        suffix: .log
        request-attributes-enabled: true
        rename-on-rotate: true
      max-http-form-post-size: 200MB
  logging:
    level:
      root: INFO
      com.seekweb4.chat: DEBUG
    config: classpath:logback-spring.xml

spring:
  servlet:
    multipart:
      maxFileSize:  2048MB
      maxRequestSize: 2048MB
  devtools:
    restart:
      enabled: false

  data:
    mongodb:
      uri: mongodb://admin:admin@localhost:27017/admin
  datasource:
    username: root
    password: root
    url: jdbc:mysql://localhost:3306/im?useUnicode=true&characterEncoding=utf-8&useSSL=false&nullCatalogMeansCurrent=true&serverTimezone=Asia/Shanghai
#    url: jdbc:mysql://localhost:3306/caizongim?useUnicode=true&characterEncoding=utf-8&useSSL=false&nullCatalogMeansCurrent=true&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      register-mbeans: true
      connection-timeout: 30000       # 等待连接池分配连接的最大时长（毫秒），超过这个时长还没可用的连接则发生SQLException， 默认:30秒
      minimum-idle: 5                 # 最小连接数
      maximum-pool-size: 20           # 最大连接数
      auto-commit: true               # 自动提交
      idle-timeout: 300000           # 连接超时的最大时长（毫秒），超时则被释放（retired），默认:10分钟
      pool-name: DataSourceHikariCP     # 连接池名字
      max-lifetime: 900000           # 连接的生命时长（毫秒），超时而且没被使用则被释放（retired），默认:30分钟 1800000ms
      connection-test-query: SELECT 1 FROM dual
      leak-detection-threshold: 30000
  # redis的配置
  redis:
    host: localhost
    port: 6379
    database: 5
    password:
    expireTime: 3600000 #单位秒
    timeout: 6000

  mvc.servlet.load-on-startup: 1
  jmx:
    enabled: false
  quartz:
    job-store-type: jdbc
    properties:
      org:
        quartz:
          scheduler:
            instanceName: clusteredScheduler
            instanceId: AUTO
          jobStore:
            selectWithLockSQL: SELECT * FROM {0}LOCKS UPDLOCK WHERE LOCK_NAME = ?
            class: org.quartz.impl.jdbcjobstore.JobStoreTX
            tablePrefix: QRTZ_
            isClustered: false # 打开集群配置
            clusterCheckinInterval: 2000 # 设置集群检查间隔20s
            useProperties: false
          threadPool:
            class: org.quartz.simpl.SimpleThreadPool
            threadCount: 17
            threadPriority: 8
            threadsInheritContextClassLoaderOfInitializingThread: true
# mybatis的配置
mybatis:
  config-location: classpath:/mybatis/mybatis-config.xml
  mapper-locations:
    - classpath*:com/*/*/modules/**/*Mapper.xml
    - classpath:/META-INF/admin-mybatis-mappings/*.xml
    - classpath:/META-INF/modeler-mybatis-mappings/*.xml
  type-aliases-package: com.seekweb4.chat.modules
  configuration-properties:
    prefix:
    boolValue: TRUE
    blobType: BLOB
#是否开启 swagger，生产环境请关闭
swagger:
  enable: false

filePath: http://119.45.9.228:82/
httpsPath: http://119.45.9.228:82/

#filePath: http://119.45.9.228:82/
#httpsPath: http://119.45.9.228:82/

#演示模式: 不能操作和保存的模块： sys
demoMode: false

# TODO Shiro权限检查开关（开发阶段可设置为false禁用所有@RequiresPermissions注解）
shiro:
  permission-check-enabled: false
#上传文件绝对路径, 路径中不允许包含“userfiles”
userfiles:
  basedir:       # 文件上传路径，可以留空
  allowedType: file  # 允许上传的文件类型， all, file ,image, audio, video, office
  extensions:
    all: all       # 允许上传所有类型文件
    file: 7z,aiff,asf,avi,bmp,csv,doc,docx,fla,flv,gif,gz,gzip,jpeg,jpg,mid,mov,mp3,mp4,mpc,mpeg,mpg,ods,odt,pdf,png,ppt,pptx,pxd,qt,ram,rar,rm,rmi,rmvb,rtf,sdc,sitd,swf,sxc,sxw,tar,tgz,tif,tiff,txt,vsd,wav,wma,wmv,xls,xlsx,zip,apk,ipa,mpa       # 只允许上传安全文件（linux系统非可执行）
    image: gif,jpg,jpeg,bmp,png     # 只允许上传图片
    audio: CD,OGG,MP3,ASF,WMA,WAV,MP3PRO,RM,REAL,APE,MODULE,MIDI,VQF,mpa    # 只允许上传音频
    video: AVI,WMV,RM,RMVB,MPEG1,MPEG2,MPEG4(MP4),3GP,ASF,SWF,VOB,DAT,MOV,M4V,FLV,F4V,MKV,MTS,TS,MP4     # 只允许上传视频
    office: txt,xls,xlsx,xlsm,xltx,xltm,xlsb,xlam,doc,docx,docm,dotx,dotm,ppt,pptx,pptm,ppsx,ppsm,potx,potm,ppam     # 只允许上传office文件
#JWT access token过期时间（access过期时间，并不是指需要重新登录的超时时间，而是指需要刷新重新获取access token的时间，超时登录的时间是3*EXPIRE_TIME，即refresh token的有效时时间)
jwt.accessToken.expireTime: 86400000 # 24小时，单位毫秒
# 移动端接口JWT过期时间
jwt.appToken.expireTime: 604800000 # 7天，单位毫秒

